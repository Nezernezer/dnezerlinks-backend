<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Airtime - Dnezerlinks</title>
    <style>
        :root { --primary: #007bff; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f4f7f6; 
            margin: 0; 
            padding: 20px; 
        }
        .card { 
            max-width: 450px; 
            margin: 20px auto; 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        h2 { color: var(--primary); text-align: center; }
        label { font-weight: bold; margin-top: 15px; display: block; }
        input, select { 
            padding: 12px; 
            margin-top: 5px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            width: 100%; 
            box-sizing: border-box; 
        }
        button { 
            margin-top: 20px; 
            padding: 15px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            width: 100%;
        }
        #pinModal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.5); 
            display: none; align-items: center; justify-content: center; 
        }
        .modal-content { 
            background: white; padding: 30px; border-radius: 15px; 
            width: 300px; text-align: center; 
        }
        .pin-input { 
            font-size: 2rem; text-align: center; letter-spacing: 5px; 
            width: 100%; margin: 15px 0;
        }

        /* Progress Bar Section */
        #loadingScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f4f7f6; display: flex; align-items: center; justify-content: center;
            flex-direction: column; z-index: 9999;
        }
        .dnezer-text {
            font-size: 2.2rem; font-weight: bold; color: var(--primary);
            margin-bottom: 20px; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.7; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1.03); }
        }
        .progress-container {
            width: 280px; height: 8px; background: #e0e0e0; border-radius: 999px;
            overflow: hidden; position: relative;
        }
        .progress-bar {
            height: 100%; width: 40%; background: linear-gradient(90deg, #007bff, #00c6ff);
            border-radius: 999px; animation: loading 1.8s infinite linear;
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.6);
        }
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }
        .progress-text {
            margin-top: 12px; color: #555; font-size: 0.95rem;
        }
    </style>
</head>
<body>

<div id="loadingScreen">
    <div class="dnezer-text">Dnezerlinks</div>
    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>
    <div class="progress-text">Preparing secure transaction...</div>
</div>

<div id="mainContent" style="display: none;">
    <div class="card">
        <a href="../home.html" style="color: var(--primary); text-decoration: none; font-weight: bold; margin-bottom: 10px; display: inline-block;">← Back to Dashboard</a>
        <h2>📱 Airtime Purchase</h2>

        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="e.g. 08123456789" oninput="autoLookupNetwork()">

        <label>Select Network</label>
        <select id="network">
            <option value="">Choose Network</option>
            <option value="MTN">MTN</option>
            <option value="GLO">Glo</option>
            <option value="AIRTEL">Airtel</option>
            <option value="9MOBILE">9mobile</option>
        </select>

        <label>Amount</label>
        <input type="number" id="amount" placeholder="Enter Amount">

        <button id="buyBtn" onclick="openPinModal()">Buy Airtime</button>
    </div>
</div>

<div id="pinModal">
    <div class="modal-content">
        <h3>Enter PIN</h3>
        <input type="text" id="txnPin" class="pin-input" maxlength="4" placeholder="0000" inputmode="numeric">
        <button id="confirmBtn" onclick="verifyAndPay()" style="width: 100%;">Confirm</button>
        <button onclick="closePinModal()" style="background:#f44336; color:white; border:none; padding:10px; border-radius:6px; cursor:pointer; width:100%; margin-top: 10px;">Cancel</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAXWh3ls4yEANmGy4g7xZ8jlBN0KoFC5yc",
    authDomain: "dnezerlinks.firebaseapp.com",
    databaseURL: "https://dnezerlinks-default-rtdb.firebaseio.com",
    projectId: "dnezerlinks",
    appId: "1:1028450580168:web:d7a48462a128f02aa657fd"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();
const auth = firebase.auth();

window.onload = () => { 
    fetch("https://dnezerlinks-backend.onrender.com/").catch(() => {}); 
};

auth.onAuthStateChanged(user => {
    if (user) {
        database.ref('users/' + user.uid).on('value', snap => {
            const data = snap.val() || {};
            
            if ((data.kyc_status || "").toUpperCase() !== "VERIFIED") {
                window.location.href = "../kyc_status.html"; 
                return;
            }
            if (!data.transaction_pin) {
                window.location.href = "../pinsetup.html"; 
                return;
            }

            // Hide progress bar and show content
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
        });
    } else {
        window.location.href = "../login.html";
    }
});

function autoLookupNetwork() {
    let phone = document.getElementById('phone').value;
    if (phone.length >= 4) {
        const prefix = phone.substring(0, 4);
        const networks = {
            'MTN': ['0803', '0806', '0810', '0813', '0814', '0816', '0703', '0706', '0903', '0906', '0913', '0916', '0702', '0704', '0707'],
            'GLO': ['0805', '0807', '0811', '0815', '0705', '0905', '0915'],
            'AIRTEL': ['0802', '0808', '0812', '0701', '0708', '0901', '0902', '0904', '0907', '0912', '0911'],
            '9MOBILE': ['0809', '0817', '0818', '0908', '0909']
        };
        for (const [name, prefixes] of Object.entries(networks)) {
            if (prefixes.includes(prefix)) {
                document.getElementById('network').value = name;
                break;
            }
        }
    }
}

function openPinModal() {
    if(!document.getElementById('amount').value || !document.getElementById('phone').value) {
        return alert("Fill all fields");
    }
    document.getElementById('pinModal').style.display = 'flex';
}

function closePinModal() { 
    document.getElementById('pinModal').style.display = 'none'; 
}

async function verifyAndPay() {
    const enteredPin = document.getElementById('txnPin').value;
    const user = auth.currentUser;
    const btn = document.getElementById('confirmBtn');
    btn.disabled = true; 
    btn.innerText = "Verifying...";

    try {
        const snap = await database.ref('users/' + user.uid).once('value');
        if (String(enteredPin) === String(snap.val().transaction_pin)) {
            executePurchase(snap.val().balance, user.uid);
        } else {
            alert("Incorrect PIN");
            btn.disabled = false; 
            btn.innerText = "Confirm";
        }
    } catch(e) {
        alert("Error checking PIN");
        btn.disabled = false; 
        btn.innerText = "Confirm";
    }
}

async function executePurchase(balance, uid) {
    const amount = document.getElementById('amount').value;
    const phone = document.getElementById('phone').value;
    const network = document.getElementById('network').value;
    const networkMap = { "MTN": "1", "GLO": "2", "9MOBILE": "3", "AIRTEL": "4" };

    if (parseFloat(balance) < parseFloat(amount)) {
        alert("Insufficient Balance");
        return closePinModal();
    }

    try {
        const res = await fetch("https://dnezerlinks-backend.onrender.com/api/airtime/buy", {
            method: "POST",
            mode: "cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ uid, phone, amount, networkID: networkMap[network] })
        });
        const data = await res.json();
        if (data.success) {
            alert("Successful!");
            window.location.href = "../home.html";
        } else {
            alert(data.error || "Transaction Failed");
            closePinModal();
        }
    } catch (e) {
        alert("Network Error. Please try again.");
        closePinModal();
    }
}
</script>
</body>
</html>
