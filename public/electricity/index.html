<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricity Bill - Dnezerlinks</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        :root { --primary: #0d47a1; --accent: #ffab00; }
        body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; background: #f4f4f4; display: flex; justify-content: center; }
        .card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
        h2 { color: var(--primary); margin-bottom: 20px; text-align: center; }
        label { font-size: 14px; font-weight: 600; color: #555; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0 20px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: var(--primary); color: white; font-weight: bold; border: none; cursor: pointer; margin-top: 5px; transition: background 0.3s; }
        button:active { background: #1565c0; transform: scale(0.98); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        /* Status feedback styles */
        .status-msg { padding: 10px; border-radius: 6px; font-weight: bold; margin-bottom: 15px; display: none; font-size: 14px; }
        .status-loading { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .status-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        
        .back-link { display: block; text-align: center; color: #666; text-decoration: none; font-size: 14px; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>💡 Electricity Bill</h2>

        <label>Select Disco</label>
        <select id="disco" onchange="checkAndValidate()">
            <option value="">-- Choose Disco --</option>
            <option value="AEDC">AEDC (Abuja)</option>
            <option value="BEDC">BEDC (Benin)</option>
            <option value="EEDC">EEDC (Enugu)</option>
            <option value="EKEDC">EKEDC (Eko)</option>
            <option value="IBEDC">IBEDC (Ibadan)</option>
            <option value="IKEDC">IKEDC (Ikeja)</option>
            <option value="JEDC">JEDC (Jos)</option>
            <option value="KAEDCO">KAEDCO (Kaduna)</option>
            <option value="KEDCO">KEDCO (Kano)</option>
            <option value="PHEDC">PHEDC (Port Harcourt)</option>
            <option value="YEDC">YEDC (Yola)</option>
        </select>

        <label>Meter Type</label>
        <select id="meterType">
            <option value="Prepaid">Prepaid</option>
            <option value="Postpaid">Postpaid</option>
        </select>

        <label>Meter Number</label>
        <input type="number" id="meterNum" placeholder="Enter Meter Number" oninput="checkAndValidate()">
        
        <div id="statusBox" class="status-msg"></div>

        <label>Amount (₦)</label>
        <input type="number" id="amount" placeholder="Min ₦1,000" min="1000">

        <button id="payBtn" onclick="processElectricity()" disabled>Pay Bill Now</button>
        <a href="../home.html" class="back-link">← Back to Dashboard</a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAXWh3ls4yEANmGy4g7xZ8jlBN0KoFC5yc",
            authDomain: "dnezerlinks.firebaseapp.com",
            databaseURL: "https://dnezerlinks-default-rtdb.firebaseio.com",
            projectId: "dnezerlinks",
            appId: "1:1028450580168:web:d7a48462a128f02aa657fd"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        let verifiedCustomerName = "";
        let lastValidatedNumber = "";

        // 1. WATCH INPUTS & TRIGGER AUTOMATICALLY ON THE 8TH DIGIT
        function checkAndValidate() {
            const disco = document.getElementById('disco').value;
            const meterNumber = String(document.getElementById('meterNum').value || "").trim();
            const payBtn = document.getElementById('payBtn');
            const statusBox = document.getElementById('statusBox');

            if (meterNumber.length < 8) {
                payBtn.disabled = true;
                statusBox.style.display = "none";
                verifiedCustomerName = "";
                lastValidatedNumber = "";
                return;
            }

            if (meterNumber.length >= 8) {
                const validationKey = `${disco}_${meterNumber}`;
                
                if (validationKey !== lastValidatedNumber) {
                    if (!disco) {
                        showStatus("❌ Please select a Disco first.", "status-error");
                        payBtn.disabled = true;
                        return;
                    }
                    lastValidatedNumber = validationKey;
                    executeAutoValidation(meterNumber, disco);
                }
            }
        }

        // 2. DISPATCH VALIDATION ASYNCHRONOUSLY
        async function executeAutoValidation(meterNumber, disco) {
            const payBtn = document.getElementById('payBtn');

            showStatus("⏳ Validating meter account details...", "status-loading");
            payBtn.disabled = true;

            try {
                const response = await fetch('/routes/validate-meter', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ meterNumber, disco })
                });

                const data = await response.json();

                if (response.ok && data.status === 'success') {
                    verifiedCustomerName = data.customer;
                    showStatus(`👤 Customer: ${verifiedCustomerName}`, "status-success");
                    payBtn.disabled = false;
                } else {
                    showStatus(`❌ Error: ${data.error || 'Invalid meter detail'}`, "status-error");
                    payBtn.disabled = true;
                }
            } catch (err) {
                console.error(err);
                showStatus("❌ Verification gateway offline.", "status-error");
                payBtn.disabled = true;
            }
        }

        function showStatus(text, className) {
            const statusBox = document.getElementById('statusBox');
            statusBox.className = `status-msg ${className}`;
            statusBox.innerText = text;
            statusBox.style.display = "block";
        }

        // 3. COMPLETE TRANSACTION VIA SERVER PROXY
        async function processElectricity() {
            const disco = document.getElementById('disco').value;
            const meterType = document.getElementById('meterType').value;
            const meterNum = document.getElementById('meterNum').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const payBtn = document.getElementById('payBtn');
            const user = auth.currentUser;

            if (!user) { alert("Please login first."); return; }
            if (isNaN(amount) || amount < 1000) {
                alert("❌ Minimum payment amount is ₦1,000.");
                return;
            }

            const confirmMsg = `CONFIRM PAYMENT\n\n👤 Name: ${verifiedCustomerName}\n🏢 Disco: ${disco}\n⚡ Type: ${meterType}\n🔢 Meter: ${meterNum}\n💰 Amount: ₦${amount.toLocaleString()}\n\nProceed?`;
            if (!confirm(confirmMsg)) return;

            payBtn.disabled = true;
            payBtn.innerText = "Processing Transaction...";

            try {
                const response = await fetch('/routes/pay', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        uid: user.uid,
                        meterNumber: meterNum,
                        amount: amount,
                        tokenType: meterType,
                        disco: disco
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    alert(`✅ Payment Successful!\n${data.token ? 'Token: ' + data.token : ''}`);
                    window.location.href = "../home.html";
                } else {
                    alert(`❌ Payment Failed: ${data.error}`);
                    payBtn.disabled = false;
                    payBtn.innerText = "Pay Bill Now";
                }
            } catch (err) {
                console.error(err);
                alert("❌ Gateway communication error.");
                payBtn.disabled = false;
                payBtn.innerText = "Pay Bill Now";
            }
        }
    </script>
</body>
</html>
