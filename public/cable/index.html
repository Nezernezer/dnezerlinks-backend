<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cable TV - Dnezerlinks</title>
    <style>
        :root { --primary: #007bff; }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
        }

        /* Perfect Center Alignment */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #mainContent {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        h2 { color: var(--primary); text-align: center; margin: 0 0 20px 0; font-size: 1.5rem; }

        #statusMsg { padding: 12px; margin-bottom: 15px; border-radius: 8px; display: none; font-size: 0.9rem; text-align: center; font-weight: 500; }
        .error-msg { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
        .success-msg { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }

        label { font-weight: bold; margin-top: 15px; display: block; color: #444; font-size: 0.9rem; }
        input, select { padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 1rem; outline: none; }

        .price-display { background: #e3f2fd; padding: 12px; margin-top: 15px; border-radius: 8px; text-align: center; border: 1px dashed var(--primary); display: none; }

        button { margin-top: 25px; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1rem; transition: 0.3s; }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        #pinModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 320px; text-align: center; }
        .pin-input { font-size: 2rem; text-align: center; letter-spacing: 10px; width: 100%; margin: 15px 0; border: 1px solid #ccc; border-radius: 8px; }
        .cancel-btn { background: #f44336; margin-top: 10px; width: 100%; padding: 10px; color: white; border: none; border-radius: 8px; cursor: pointer; }

        @media (max-width: 360px) {
            .card { padding: 15px; }
        }
    </style>
</head>
<body>

<div id="mainContent">
    <a href="../home.html" style="color: var(--primary); text-decoration: none; font-weight: bold; display: inline-block; margin-bottom: 10px;">← Back to Dashboard</a>
    <div class="card">
        <h2>🛰️ Cable TV</h2>
        <div id="statusMsg"></div>

        <label>Select Provider</label>
        <select id="provider" onchange="populatePlans()">
            <option value="">Choose Provider</option>
            <option value="1">GOtv</option>
            <option value="2">DStv</option>
            <option value="3">StarTimes</option>
            <option value="4">Showmax</option>
        </select>

        <label>Select Package</label>
        <select id="planList" onchange="updatePriceDisplay()">
            <option value="">Select Provider First</option>
        </select>

        <div id="priceDisplay" class="price-display">
            <small>AMOUNT TO PAY</small><br>
            <b id="totalVal" style="font-size: 1.4rem; color: var(--primary);">₦0</b>
        </div>

        <label>IUC / SmartCard Number</label>
        <input type="text" id="iuc" placeholder="Enter Decoder Number" oninput="autoLookupCustomer()">
        <div id="customerInfo" style="margin-top: 5px; font-size: 0.85rem; font-weight: bold; min-height: 1.2rem;"></div>

        <button id="buyBtn" onclick="validateUserAndOpenModal()">Activate Subscription</button>
    </div>
</div>

<div id="pinModal">
    <div class="modal-content">
        <h3>Enter PIN</h3>
        <div id="pinError" style="color: red; font-size: 0.8rem; margin-bottom: 5px;"></div>
        <input type="password" id="txnPin" class="pin-input" maxlength="4" placeholder="••••" inputmode="numeric">
        
        <button onclick="togglePinVisibility()" style="background: #6c757d; color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; margin-bottom: 10px;" id="toggleBtn">Show PIN</button>
        
        <button id="confirmBtn" onclick="verifyAndPay()" style="background: var(--primary); color: white; width:100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">Confirm Payment</button>
        <button class="cancel-btn" onclick="closePinModal()">Cancel</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="cable_plans.js"></script>
<script src="handler.js"></script>
</body>
</html>
