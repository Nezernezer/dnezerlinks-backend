<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dnezerlinks | Account</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #0d47a1; --accent: #ffab00; --success: #00c853; }
        body { font-family: 'Segoe UI', sans-serif; background:#f1f3f4; margin:0; padding-bottom:80px; }
        .balance-card { background: var(--primary); color: #fff; text-align: center; padding: 25px; border-radius: 0 0 20px 20px; }
        .balance { font-size: 28px; font-weight: bold; color: var(--accent); }
        .card { background:#fff; margin:15px; padding:20px; border-radius:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
        button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-fund { background: var(--success); color: white; }
        .btn-support { background: #eee; color: var(--primary); }
        .btn-danger { background: #d32f2f; color: white; }
        .history-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .bottom-nav { position:fixed; bottom:0; width:100%; background:#fff; display:flex; justify-content:space-around; border-top:1px solid #ddd; padding:12px 0; }
        .nav-item { text-align: center; font-size: 10px; color: #777; cursor: pointer; }
        .active { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

<div class="balance-card">
    <div class="balance">₦<span id="balDisplay">0.00</span></div>
    <small>Wallet Balance</small>
</div>

<div class="card">
    <button class="btn-fund" onclick="location.href='fund.html'">💳 Fund Wallet</button>
    <button class="btn-support" onclick="location.href='support.html'">📞 Contact Support</button>
</div>

<div class="card" style="padding:0;">
    <h3 style="padding: 15px 20px 0 20px;">History</h3>
    <div id="historyList"></div>
</div>

<div class="card">
    <button class="btn-danger" onclick="logout()">🚪 Logout</button>
</div>

<div class="bottom-nav">
    <div class="nav-item" onclick="location.href='home.html'">🏠<br>HOME</div>
    <div class="nav-item" onclick="location.href='profile.html'">👤<br>PROFILE</div>
    <div class="nav-item active" onclick="location.href='account.html'">⚙️<br>ACCOUNT</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAXWh3ls4yEANmGy4g7xZ8jlBN0KoFC5yc",
        authDomain: "dnezerlinks.firebaseapp.com",
        projectId: "dnezerlinks",
        storageBucket: "dnezerlinks.firebasestorage.app",
        messagingSenderId: "1028450580168",
        appId: "1:1028450580168:web:d7a48462a128f02aa657fd"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    auth.onAuthStateChanged(user => {
        if (user) {
            db.collection("users").doc(user.uid).onSnapshot(doc => {
                if(doc.exists) document.getElementById('balDisplay').innerText = doc.data().walletBalance.toFixed(2);
            });
            loadHistory(user.uid);
        } else { location.href = 'login.html'; }
    });

    async function loadHistory(uid) {
        const snap = await db.collection("users").doc(uid).collection("history").orderBy('date','desc').get();
        let h = "";
        snap.forEach(doc => {
            const d = doc.data();
            h += `<div class="history-item"><div><b>${d.service.toUpperCase()}</b><br><small>${d.date}</small></div><div style="color:green;">₦${d.amount}</div></div>`;
        });
        document.getElementById('historyList').innerHTML = h || "<p style='padding:20px;'>No history.</p>";
    }

    function logout() { auth.signOut().then(() => location.href = 'login.html'); }
</script>
</body>
</html>
