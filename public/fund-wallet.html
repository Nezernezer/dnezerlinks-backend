<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fund Wallet - Dnezerlinks</title>

    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>

    <style>
        *{ box-sizing:border-box; }
        body{ font-family:'Segoe UI',sans-serif; background:#f4f7f6; margin:0; padding:20px; color:#333; }
        .container{ max-width:500px; margin:auto; background:white; padding:25px; border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); }
        .back-btn{ border:none; background:none; color:#007bff; cursor:pointer; margin-bottom:10px; font-size:15px; }
        h2{ color:#007bff; text-align:center; margin-bottom:15px; }
        .balance-box{ background:#007bff; color:white; padding:18px; border-radius:12px; text-align:center; margin-bottom:20px; }
        .balance-title{ font-size:0.9rem; opacity:0.9; }
        #wallet-balance{ font-size:1.9rem; font-weight:bold; margin-top:5px; display:block; }
        #status-msg{ text-align:center; font-weight:bold; padding:20px; font-size:1rem; min-height:60px; transition:all 0.5s ease; }
        #account-ui{ display:none; }
        .bank-card{ border:2px dashed #007bff; padding:18px; border-radius:12px; background:#eef6ff; }
        .label{ font-size:0.8rem; color:#666; margin-bottom:4px; display:block; }
        .value{ font-size:1.1rem; font-weight:bold; margin-bottom:15px; display:block; word-break:break-word; }
        .acc-num-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:15px; }
        #acc-number{ font-size:1.4rem; font-weight:bold; color:#222; }
        .copy-btn{ background:#007bff; color:white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; font-weight:bold; }
        .note{ font-size:0.8rem; color:red; text-align:center; margin-top:15px; }
        .refresh-box{ margin-top:20px; text-align:center; }
        .refresh-btn{ background:#28a745; color:white; border:none; padding:12px 18px; border-radius:8px; cursor:pointer; font-weight:bold; }
    </style>
</head>
<body>

<div class="container">
    <button class="back-btn" onclick="location.href='home.html'">⬅ Back Home</button>
    <h2>Fund Wallet</h2>

    <div class="balance-box">
        <span class="balance-title">Wallet Balance</span>
        <span id="wallet-balance">₦0.00</span>
    </div>

    <div id="status-msg">Initializing account setup...</div>

    <div id="account-ui">
        <div class="bank-card">
            <span class="label">BANK NAME</span>
            <span class="value" id="bank-name">---</span>

            <span class="label">ACCOUNT NUMBER</span>
            <div class="acc-num-row">
                <span id="acc-number">----------</span>
                <button class="copy-btn" onclick="copyAccount()">Copy</button>
            </div>

            <span class="label">ACCOUNT NAME</span>
            <span class="value" id="acc-name">---</span>
        </div>
        <p class="note">Note: A 2% fee applies to all automated deposits.</p>
        <div class="refresh-box">
            <button class="refresh-btn" onclick="location.reload()">Refresh Balance</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAXWh3ls4yEANmGy4g7xZ8jlBN0KoFC5yc",
    authDomain: "dnezerlinks.firebaseapp.com",
    databaseURL: "https://dnezerlinks-default-rtdb.firebaseio.com",
    projectId: "dnezerlinks",
    appId: "1:1028450580168:web:d7a48462a128f02aa657fd"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ================= UPDATED LOADING ANIMATION =================
function startLoadingAnimations() {
    const statusMsg = document.getElementById("status-msg");
    const messages = [
        { text: "Connecting to secure banking server...", color:"#E67E22", time: 3000 },
        { text: "Generating dedicated account number...", color:"#3498DB", time: 4000 },
        { text: "Finalizing account reservation...", color:"#27AE60", time: 5000 }
    ];

    let index = 0;
    function updateText() {
        if (document.getElementById("account-ui").style.display === "block") return;
        const current = messages[index];
        statusMsg.innerText = current.text;
        statusMsg.style.color = current.color;
        index = (index + 1) % messages.length;
        setTimeout(updateText, current.time);
    }
    updateText();
}

// ================= AUTH & LOGIC =================
firebase.auth().onAuthStateChanged(async (user) => {
    if (!user) {
        window.location.href = 'login.html';
        return;
    }

    const userRef = db.ref(`users/${user.uid}`);
    let animationStarted = false;

    userRef.on('value', async (snap) => {
        const data = snap.val() || {};

        // Update Balance
        document.getElementById("wallet-balance").innerText = "₦" + 
            parseFloat(data.balance || 0).toLocaleString(undefined, { minimumFractionDigits:2 });

        // If account already exists in Firebase
        if (data.account_number) {
            document.getElementById("bank-name").innerText = data.bank_name || "Bankly/PalmPay";
            document.getElementById("acc-number").innerText = data.account_number;
            document.getElementById("acc-name").innerText = data.account_name || "Customer Account";
            document.getElementById("status-msg").style.display = "none";
            document.getElementById("account-ui").style.display = "block";
            return;
        }

        // Trigger loading if no account
        if (!animationStarted) {
            animationStarted = true;
            startLoadingAnimations();
        }

        if (window.accountRequestSent) return;
        window.accountRequestSent = true;

        // Prepare Names
        const nameParts = (data.name || "Customer User").trim().split(/\s+/);
        const firstName = nameParts[0] || "Customer";
        const lastName = nameParts.length > 1 ? nameParts[nameParts.length - 1] : "Client";

        try {
            const response = await fetch('https://dnezerlinks-backend.onrender.com/api/account/fund', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    uid: user.uid,
                    email: user.email,
                    first_name: firstName,
                    last_name: lastName,
                    phone: data.phone || "08000000000"
                })
            });

            const result = await response.json();

            if (!result.success) {
                window.accountRequestSent = false;
                document.getElementById("status-msg").innerText = result.error || "Generation Error";
                document.getElementById("status-msg").style.color = "red";
            }
            // Logic ends here; Firebase listener will pick up the update and show the UI automatically
        } catch (err) {
            window.accountRequestSent = false;
            document.getElementById("status-msg").innerText = "Connection failed. Please check internet.";
        }
    });
});

function copyAccount() {
    const num = document.getElementById("acc-number").innerText;
    navigator.clipboard.writeText(num).then(() => { alert("Copied!"); });
}
</script>
</body>
</html>
