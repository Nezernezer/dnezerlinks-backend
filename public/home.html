<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dnezerlinks | Home</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #0d47a1; --accent: #ffab00; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; }
        .header { background: var(--primary); color: white; padding: 35px 20px; border-radius: 0 0 25px 25px; text-align: center; position: relative; }
        .balance-amount { font-size: 32px; font-weight: 800; color: var(--accent); margin: 10px 0; }

        /* Repositioned Notification Button down slightly to clear room for API Container */
        .notif-btn { position: absolute; top: 38px; left: 15px; font-size: 20px; cursor: pointer; text-decoration: none; color: white; border: none; background: none; outline: none; }
        .notif-badge { position: absolute; top: -5px; right: -5px; background: red; color: white; font-size: 10px; padding: 2px 6px; border-radius: 50%; font-weight: bold; display: none; }

        /* New Style Rules for Top Left Corner API Display Dashboard */
        .vtu-api-container { position: absolute; top: 12px; left: 15px; text-align: left; font-family: 'Segoe UI', sans-serif; display: none; }
        .vtu-api-label { font-size: 9px; color: rgba(255, 255, 255, 0.7); display: block; text-transform: uppercase; letter-spacing: 0.3px; font-weight: 600; }
        .vtu-api-value { font-size: 12px; color: var(--accent); font-weight: bold; }

        .news-ticker { background: #e3f2fd; padding: 10px 0; border-bottom: 1px solid #bbdefb; overflow: hidden; white-space: nowrap; cursor: pointer; }
        .ticker-text { display: inline-block; padding-left: 100%; font-size: 13px; font-weight: 700; color: var(--primary); animation: ticker 25s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        .services-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; }
        .service-item { background: white; padding: 15px 5px; border-radius: 12px; text-align: center; border: 1px solid #eee; transition: 0.2s; }
        .service-item:active { transform: scale(0.95); }
        .service-item span { display: block; font-size: 9px; font-weight: 700; margin-top: 5px; color: var(--primary); text-transform: uppercase; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #ddd; z-index: 1000; }
        .nav-link { text-align: center; font-size: 10px; color: #888; text-decoration: none; }
        .nav-link.active { color: var(--primary); font-weight: bold; }
        .admin-switch { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.2); color: white; border: 1px solid white; padding: 6px 12px; border-radius: 15px; font-size: 10px; }
        .pending-badge { background: #ff5252; color: white; padding: 2px 6px; border-radius: 10px; font-size: 9px; margin-left: 5px; font-weight: bold; }
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 15% auto; padding: 20px; border-radius: 20px; width: 85%; max-width: 400px; max-height: 70vh; overflow-y: auto; position: relative; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        .close-btn { font-size: 24px; font-weight: bold; cursor: pointer; color: #888; border:none; background:none; }
        .notif-item { padding: 12px; border-bottom: 1px solid #f1f1f1; font-size: 13px; line-height: 1.4; color: #333; text-align: left; }
        .notif-item.unread { background: #fff9e6; border-left: 4px solid var(--accent); }
        .notif-time { font-size: 10px; color: #999; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="header">
    <div id="vtuApiContainer" class="vtu-api-container">
        <span class="vtu-api-label">Master </span>
        <span id="vtuApiBalance" class="vtu-api-value">Loading...</span>
    </div>

    <button class="notif-btn" onclick="openNotif()">🔔<span id="notifBadge" class="notif-badge">0</span></button>
    <div id="adminContainer"></div>
    <div id="userName" style="font-size: 14px;">Updating your dashboard...</div>
    <div class="balance-amount">₦<span id="balDisplay">0.00</span></div>
    <div style="font-size: 11px; opacity: 0.8;">WALLET BALANCE</div>
</div>

<div class="news-ticker" id="tickerBar" style="display:none;">
    <div class="ticker-text" id="globalUpdate">Latest information shows here...</div>
</div>

<div class="services-grid">
    <div class="service-item" onclick="location.href='airtime/'">📱<span>Airtime</span></div>
    <div class="service-item" onclick="location.href='data/'">📶<span>Data</span></div>
    <div class="service-item" onclick="location.href='cable/'">📺<span>Cable TV</span></div>
    <div class="service-item" onclick="location.href='exampin/'">🎓<span>Exam Pin</span></div>
    <div class="service-item" onclick="location.href='bulksms/'">✉️<span>Bulk SMS</span></div>
    <div class="service-item" onclick="location.href='recharge-pin/'">🎫<span>Recharge PIN</span></div>
    <div class="service-item" onclick="location.href='electricity/'">💡<span>Electricity</span></div>
    <div class="service-item" onclick="location.href='airtime-to-cash/'">♻️<span>Swap</span></div>
    <div class="service-item" onclick="location.href='fund-wallet.html'">💰<span>Fund Wallet</span></div>
    <div class="service-item" onclick="location.href='history.html'">📜<span>History</span></div>
    <div class="service-item" onclick="location.href='send-money.html'">💸<span>Send Money</span></div>
</div>

<div class="bottom-nav">
    <a href="home.html" class="nav-link active">🏠<br>HOME</a>
    <a href="profile.html" class="nav-link">👤<br>PROFILE</a>
    <a href="support.html" class="nav-link">📞<br>SUPPORT</a>
    <a href="account.html" class="nav-link">⚙️<br>ACCOUNT</a>
</div>

<div id="notifModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 style="margin:0; color:var(--primary); font-size:18px;">Notifications</h3>
            <button class="close-btn" onclick="closeNotif()">&times;</button>
        </div>
        <div id="notifContainer">
            <p style="text-align:center; color:#888;">No messages yet</p>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAXWh3ls4yEANmGy4g7xZ8jlBN0KoFC5yc",
        authDomain: "dnezerlinks.firebaseapp.com",
        databaseURL: "https://dnezerlinks-default-rtdb.firebaseio.com",
        projectId: "dnezerlinks",
        appId: "1:1028450580168:web:d7a48462a128f02aa657fd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser = null;
    const MASTER_ADMIN_UID = "VCSNLSzYV2WsNG93mPE2ZtwdTna2";

    // Data Engine States for Merging Channels
    let userNotifications = [];
    let globalBroadcast = null;

    firebase.auth().onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            db.ref('users/' + user.uid).on('value', snap => {
                const d = snap.val() || {};
                document.getElementById('balDisplay').innerText = parseFloat(d.balance || 0).toLocaleString(undefined, {minimumFractionDigits: 2});
                document.getElementById('userName').innerText = "Welcome, " + (d.name || "User");

                if (user.uid === MASTER_ADMIN_UID) {
                    document.getElementById('vtuApiContainer').style.display = 'block';
                    fetchVtuNaijaBalance();

                    db.ref('users').orderByChild('kyc_status').equalTo('PENDING').on('value', s => {
                        const count = s.numChildren();
                        const badge = count > 0 ? `<span class="pending-badge">${count}</span>` : "";
                        document.getElementById('adminContainer').innerHTML = `<button class="admin-switch" onclick="location.href='admin/index.html'">Admin ⚙️${badge}</button>`;
                    });
                }
            });

            // Sync Stream A: User Personal Notifications Realtime Listener
            db.ref('notifications/' + user.uid).on('value', snap => {
                userNotifications = [];
                snap.forEach(child => {
                    userNotifications.push({
                        key: child.key,
                        ...child.val()
                    });
                });
                renderCombinedNotifications();
            });

            // Sync Stream B: Global Broadcast Settings Realtime Listener
            db.ref('system_settings').on('value', snap => {
                const settings = snap.val() || {};
                if (settings.global_broadcast_message && settings.global_broadcast_message.trim() !== "") {
                    globalBroadcast = {
                        message: settings.global_broadcast_message,
                        timestamp: settings.broadcast_timestamp || Date.now()
                    };
                } else {
                    globalBroadcast = null;
                }
                renderCombinedNotifications();
            });

            document.getElementById('tickerBar').style.display = 'block';
            loadMarquee();
        } else { window.location.href = 'login.html'; }
    });

    // Combined Array UI Renderer Function
    function renderCombinedNotifications() {
        if (!currentUser) return;
        const badge = document.getElementById('notifBadge');
        const container = document.getElementById('notifContainer');
        
        let unreadCount = 0;
        userNotifications.forEach(n => { if (!n.read) unreadCount++; });
        
        if (globalBroadcast) {
            const seenBroadcastTime = localStorage.getItem('dnezer_seen_broadcast_time');
            if (seenBroadcastTime !== globalBroadcast.timestamp.toString()) {
                unreadCount++;
            }
        }

        if (unreadCount > 0) {
            badge.innerText = unreadCount;
            badge.style.display = 'block';
        } else {
            badge.style.display = 'none';
        }

        if (document.getElementById('notifModal').style.display === "block") {
            container.innerHTML = '';
            let combinedItems = [];

            userNotifications.forEach(n => combinedItems.push(n));

            if (globalBroadcast) {
                const seenBroadcastTime = localStorage.getItem('dnezer_seen_broadcast_time');
                const isUnread = seenBroadcastTime !== globalBroadcast.timestamp.toString();
                combinedItems.push({
                    id: 'global_broadcast_msg',
                    message: `📢 ANNOUNCEMENT: ${globalBroadcast.message}`,
                    timestamp: globalBroadcast.timestamp,
                    read: !isUnread,
                    isGlobal: true
                });
            }

            combinedItems.sort((a, b) => b.timestamp - a.timestamp);

            if (combinedItems.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#888;">No messages yet</p>';
                return;
            }

            combinedItems.forEach(n => {
                const item = document.createElement('div');
                item.className = `notif-item ${n.read ? '' : 'unread'}`;
                item.innerHTML = `<div>${n.message}</div><span class="notif-time">${new Date(n.timestamp).toLocaleString()}</span>`;
                
                if (!n.read && !n.isGlobal) {
                    db.ref(`notifications/${currentUser.uid}/${n.key}`).update({ read: true });
                }
                
                container.appendChild(item);
            });

            if (globalBroadcast) {
                localStorage.setItem('dnezer_seen_broadcast_time', globalBroadcast.timestamp);
            }
        }
    }

    async function fetchVtuNaijaBalance() {
        const balanceElement = document.getElementById('vtuApiBalance');
        try {
            if (!firebase.auth().currentUser) return;
            const idToken = await firebase.auth().currentUser.getIdToken(true);
            const backendDomain = "https://dnezerlinks-backend.onrender.com";

            const response = await fetch(`${backendDomain}/api/admin/user`, {
                method: "GET",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + idToken
                }
            });

            if (!response.ok) throw new Error("HTTP Status: " + response.status);
            const data = await response.json();
            const balance = data.balance || (data.user && data.user.balance) || "0.00";
            balanceElement.innerText = "₦" + Number(balance).toLocaleString(undefined, {minimumFractionDigits: 2});
        } catch (error) {
            console.error(error);
            balanceElement.innerText = "Error";
            balanceElement.style.color = "#ff5252";
        }
    }

    function loadMarquee() {
        const ticker = document.getElementById("globalUpdate");
        db.ref("system_settings/global_update").on("value", snap => {
            ticker.innerText = snap.val() || "Welcome to Dnezerlinks...";
            ticker.style.animation = "none";
            setTimeout(() => { ticker.style.animation = "ticker 25s linear infinite"; }, 50);
        });
    }

    function openNotif() {
        document.getElementById('notifModal').style.display = "block";
        renderCombinedNotifications();
    }
    function closeNotif() { document.getElementById('notifModal').style.display = "none"; }
    window.onclick = function(event) { if (event.target == document.getElementById('notifModal')) closeNotif(); }
</script>

<style>
    .toggle-bal-btn {
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: #ffffff;
        font-size: 11px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        cursor: pointer;
        vertical-align: middle;
        margin-left: 10px;
        outline: none;
        padding: 4px 8px;
        border-radius: 4px;
        transition: background 0.2s;
    }
    .toggle-bal-btn:active { background: rgba(255, 255, 255, 0.3); }
</style>

<script>
    (function() {
        const cachedName = localStorage.getItem('dnezer_cached_name');
        const cachedBal = localStorage.getItem('dnezer_cached_bal');
        const isHidden = localStorage.getItem('dnezer_bal_hidden') === 'true';

        const nameEl = document.getElementById('userName');
        const balEl = document.getElementById('balDisplay');

        if (cachedName) nameEl.innerText = cachedName;
        if (cachedBal) {
            balEl.setAttribute('data-real-bal', cachedBal);
            balEl.innerText = isHidden ? '••••••' : cachedBal;
        }

        const toggleBtn = document.createElement('button');
        toggleBtn.className = 'toggle-bal-btn';                                                 toggleBtn.id = 'toggleBalBtn';
        toggleBtn.innerHTML = isHidden ? 'Show' : 'Hide';
        balEl.parentNode.appendChild(toggleBtn);

        toggleBtn.addEventListener('click', () => {
            const currentHidden = localStorage.getItem('dnezer_bal_hidden') === 'true';
            const realBal = balEl.getAttribute('data-real-bal') || balEl.innerText;

            if (currentHidden) {
                balEl.innerText = realBal;
                toggleBtn.innerHTML = 'Hide';
                localStorage.setItem('dnezer_bal_hidden', 'false');
            } else {
                balEl.setAttribute('data-real-bal', realBal);
                balEl.innerText = '••••••';
                toggleBtn.innerHTML = 'Show';
                localStorage.setItem('dnezer_bal_hidden', 'true');
            }
        });

        setInterval(() => {
            const currentUIName = nameEl.innerText;
            const currentUIBal = balEl.innerText;

            if (currentUIName && !currentUIName.includes('Updating your dashboard...')) {
                localStorage.setItem('dnezer_cached_name', currentUIName);
            }

            if (currentUIBal && currentUIBal !== '0.00' && currentUIBal !== '••••••') {
                localStorage.setItem('dnezer_cached_bal', currentUIBal);
                balEl.setAttribute('data-real-bal', currentUIBal);

                if (localStorage.getItem('dnezer_bal_hidden') === 'true') {
                    balEl.innerText = '••••••';
                }
            }
        }, 100);
    })();
</script>
</body>
</html>
