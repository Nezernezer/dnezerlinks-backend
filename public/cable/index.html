<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dnezerlinks | Cable TV Subscription</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
        header { background: #0d47a1; color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; }
        label { display: block; margin: 15px 0 6px; font-weight: 600; color: #333; }
        select, input { width: 100%; padding: 13px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; outline: none; }
        select:focus, input:focus { border-color: #0d47a1; }
        
        /* THE KEY FIX: This masks the numbers in the PIN field like a password */
        #pin { -webkit-text-security: disc; }

        button { width: 100%; padding: 14px; margin-top: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .validate-btn { background: #28a745; color: white; margin-bottom: 10px; }
        .pay-btn { background: #0d47a1; color: white; font-size: 1.1rem; }
        .price-display { background: #e3f2fd; padding: 16px; margin: 15px 0; border-radius: 10px; text-align: center; border: 2px dashed #0d47a1; display: none; }
        .amount { font-size: 2rem; font-weight: 800; color: #0d47a1; }
        .pin-toggle { display: flex; align-items: center; gap: 10px; margin: 12px 0; font-size: 0.95rem; cursor: pointer; color: #555; }
        .pin-toggle input { width: auto; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>🛰️ Cable TV Subscription</h2>
    </header>
    
    <div class="content">
        <form id="cableForm" autocomplete="off">
            <label>Provider</label>
            <select id="provider" required>
                <option value="">-- Select Provider --</option>
                <option value="GOTV">GOtv</option>
                <option value="DSTV">DStv</option>
                <option value="STARTIMES">StarTimes</option>
                <option value="SHOWMAX">Showmax</option>
            </select>

            <label>Bouquet / Package</label>
            <select id="planList" required>
                <option value="">-- Choose Provider First --</option>
            </select>

            <div id="priceDisplay" class="price-display">
                <small>PAYABLE AMOUNT</small><br>
                <span id="totalVal" class="amount">₦0</span>
            </div>

            <label>SmartCard / IUC Number</label>
            <input type="text" id="iuc" name="iuc_no" autocomplete="on" placeholder="Enter Decoder / IUC Number" required>

            <button type="button" id="validateBtn" class="validate-btn">Validate SmartCard</button>

            <label>Transaction PIN</label>
            <input type="tel" id="pin" name="vtu_pin_field" maxlength="4" placeholder="Enter 4-digit PIN" required>

            <label class="pin-toggle">
                <input type="checkbox" id="showPin"> Show PIN
            </label>

            <button type="submit" id="payBtn" class="pay-btn">Activate Subscription</button>
        </form>
    </div>
</div>

<script src="cable_plans.js"></script>
</body>
</html>
