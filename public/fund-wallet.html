<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fund Wallet - Dnezerlinks</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #007bff; text-align: center; margin-bottom: 10px; }
        .balance-box { background: #007bff; color: white; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        .bank-card { border: 2px dashed #007bff; padding: 15px; border-radius: 10px; background: #eef6ff; }
        .label { font-size: 0.85rem; color: #666; margin-bottom: 2px; display: block; }
        .value { font-size: 1.1rem; font-weight: bold; margin-bottom: 12px; display: block; }
        .acc-num-row { display: flex; align-items: center; justify-content: space-between; }
        #acc-number { font-size: 1.4rem; color: #222; font-weight: bold; }
        .copy-btn { background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        
        /* Animation Styling */
        #status-msg { 
            text-align: center; 
            font-weight: bold; 
            padding: 20px; 
            font-size: 1.1rem;
            min-height: 60px;
            transition: color 0.5s ease, opacity 0.5s ease;
        }
        
        #account-ui { display: none; }
    </style>
</head>
<body>

<div class="container">
    <button onclick="location.href='home.html'" style="border:none; background:none; color:#007bff; cursor:pointer; margin-bottom:10px;">⬅ Back Home</button>
    <h2>Fund Wallet</h2>
    <div class="balance-box">
        <span style="font-size: 0.9rem;">Wallet Balance</span><br>
        <span id="wallet-balance" style="font-size: 1.8rem; font-weight: bold;">₦0.00</span>
    </div>

    <!-- This is where the animated text will appear -->
    <div id="status-msg">Initiating account setup...</div>

    <div id="account-ui">
        <div class="bank-card">
            <span class="label">BANK NAME</span>
            <span class="value" id="bank-name">---</span>
            <span class="label">ACCOUNT NUMBER</span>
            <div class="acc-num-row">
                <span id="acc-number">----------</span>
                <button class="copy-btn" onclick="copyAccount()">Copy</button>
            </div>
            <span class="label" style="margin-top:15px;">ACCOUNT NAME</span>
            <span class="value" id="acc-name">---</span>
        </div>
        <p style="font-size:0.8rem; color:red; text-align:center; margin-top:10px;">Note: A 2% fee applies to all automated deposits.</p>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAXWh3ls4yEANmGy4g7xZ8jlBN0KoFC5yc",
        authDomain: "dnezerlinks.firebaseapp.com",
        databaseURL: "https://dnezerlinks-default-rtdb.firebaseio.com",
        projectId: "dnezerlinks",
        appId: "1:1028450580168:web:d7a48462a128f02aa657fd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Text Animation Logic
    function startLoadingAnimations() {
        const statusMsg = document.getElementById("status-msg");
        const messages = [
            { text: "Sending a request to create account, this may take a while...", color: "#E67E22", time: 15000 }, // Orange
            { text: "Generating your dedicated account number, Please wait...", color: "#3498DB", time: 15000 },  // Blue
            { text: "Processing account details, please stay on the page.", color: "#27AE60", time: 30000 },     // Green
            { text: "Your account number will be ready soon, please be patient.", color: "#8E44AD", time: 30000 }      // Purple
        ];

        let index = 0;

        function updateText() {
            if (index < messages.length) {
                const current = messages[index];
                statusMsg.innerText = current.text;
                statusMsg.style.color = current.color;
                
                setTimeout(() => {
                    index++;
                    updateText();
                }, current.time);
            } else {
                // Loop: Alternate between 3 and 4 (index 2 and 3)
                index = (index === 2) ? 3 : 2;
                const current = messages[index];
                statusMsg.innerText = current.text;
                statusMsg.style.color = current.color;
                setTimeout(updateText, current.time);
            }
        }
        updateText();
    }

    firebase.auth().onAuthStateChanged(async (user) => {
        if (!user) return window.location.href = 'login.html';

        const userRef = db.ref(`users/${user.uid}`);
        let animationStarted = false;

        userRef.on('value', async (snap) => {
            const data = snap.val() || {};

            if (data.account_number) {
                document.getElementById("wallet-balance").innerText = "₦" + parseFloat(data.balance || 0).toLocaleString(undefined, {minimumFractionDigits: 2});
                document.getElementById("bank-name").innerText = data.bank_name;
                document.getElementById("acc-number").innerText = data.account_number;
                document.getElementById("acc-name").innerText = data.account_name || "Customer";

                document.getElementById("status-msg").style.display = "none";
                document.getElementById("account-ui").style.display = "block";
            } else {
                // Kick off the colorful animations
                if (!animationStarted) {
                    animationStarted = true;
                    startLoadingAnimations();
                }

                // Name splitting logic
                const rawName = data.name || "";
                const nameParts = rawName.trim().split(/\s+/);
                let fName = nameParts[0] || "Customer";
                let lName = nameParts[1] ? nameParts[1].substring(0, 2) : user.uid.substring(0, 3);

                try {
                    await fetch('https://dnezerlinks-backend.onrender.com/api/account/fund', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            uid: user.uid,
                            email: user.email,
                            first_name: fName,
                            last_name: lName,
                            phone: data.phone || "08000000000"
                        })
                    });
                } catch (err) {
                    console.error("Fetch Error:", err);
                }
            }
        });
    });

    function copyAccount() {
        const num = document.getElementById("acc-number").innerText;
        navigator.clipboard.writeText(num).then(() => alert("Copied to clipboard!"));
    }
</script>
</body>
</html>
