<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dnezerlinks | Bulk SMS</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #0d47a1; --accent: #ffab00; }
        body { font-family: 'Segoe UI', sans-serif; background: #f1f3f4; margin: 0; padding-bottom: 80px; }
        .header-card { background: var(--primary); color: #fff; padding: 20px; border-radius: 0 0 20px 20px; display: flex; align-items: center; }
        .back-btn { background: none; border: none; color: white; font-size: 20px; cursor: pointer; margin-right: 15px; }
        .card { background: #fff; border-radius: 15px; padding: 20px; margin: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 13px; color: #666; font-weight: bold; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; font-family: inherit; outline: none; }
        .char-count { font-size: 11px; color: #888; text-align: right; margin-top: 5px; }
        .buy-btn { width: 100%; background: var(--primary); color: #fff; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; display: flex; justify-content: space-around; border-top: 1px solid #ddd; padding: 12px 0; }
        .nav-item { text-align: center; font-size: 10px; color: #777; cursor: pointer; text-decoration: none; }
        #pinModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 100%; max-width: 320px; text-align: center; }
        .pin-input { font-size: 2rem; text-align: center; letter-spacing: 10px; width: 100%; margin: 15px 0; border: 1px solid #ccc; border-radius: 8px; }
        .cancel-btn { background: #f44336; margin-top: 10px; width: 100%; padding: 10px; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #globalMsg { margin-bottom: 15px; padding: 10px; border-radius: 5px; display: none; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="header-card">
    <button class="back-btn" onclick="location.href='../home.html'">←</button>
    <h3 style="margin:0;">Send Bulk SMS</h3>
</div>

<div class="card">
    <div id="globalMsg"></div>
    <div class="form-group">
        <label>Sender ID (Max 11 Chars)</label>
        <input type="text" id="senderId" placeholder="e.g., JOHNDOE" maxlength="11">
    </div>
    <div class="form-group">
        <label>Recipients (Comma separated)</label>
        <textarea id="recipients" rows="3" placeholder="080123456789,07012356789" oninput="updateCount()"></textarea>
    </div>
    <div class="form-group">
        <label>Message Content</label>
        <textarea id="message" rows="5" placeholder="Type your message here..." oninput="updateCount()"></textarea>
        <div class="char-count">
            <span id="chars">0</span> characters | <span id="pages">0</span> page(s) (<span id="encoding-type">GSM</span>) | Est. Cost: <span id="cost">₦0.00</span>
        </div>
    </div>
    <button class="buy-btn" id="procBtn" onclick="openPinModal()">SEND MESSAGE</button>
</div>

<div id="pinModal">
    <div class="modal-content">
        <h3>Enter Transaction PIN</h3>
        <div id="pinError" style="color: red; font-size: 0.8rem; margin-bottom: 5px;"></div>
        <input type="password" id="txnPin" class="pin-input" maxlength="4" placeholder="••••" inputmode="numeric">
        <button onclick="togglePinVisibility()" style="background: #6c757d; color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; margin-bottom: 10px;" id="toggleBtn">Show PIN</button>
        <div id="processingSpinner" class="spinner"></div>
        <button id="confirmBtn" onclick="executeSmsTransaction()" style="background: var(--primary); color: white; width:100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">Confirm & Pay</button>
        <button class="cancel-btn" onclick="closePinModal()">Cancel</button>
    </div>
</div>

<div class="bottom-nav">
    <a class="nav-item" href="../home.html">🏠<br>HOME</a>
    <a class="nav-item" href="../profile.html">👤<br>PROFILE</a>
    <a class="nav-item" href="../account.html">⚙️<br>ACCOUNT</a>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAXWh3ls4yEANmGy4g7xZ8jlBN0KoFC5yc",
        authDomain: "dnezerlinks.firebaseapp.com",
        databaseURL: "https://dnezerlinks-default-rtdb.firebaseio.com",
        projectId: "dnezerlinks",
        appId: "1:1028450580168:web:d7a48462a128f02aa657fd"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();
    const API_BASE_URL ="https://dnezerlinks-backend.onrender.com";

    auth.onAuthStateChanged(user => { if (!user) window.location.href = "../login.html"; });

    function showGlobalMessage(text, isError = true) {
        const msgDiv = document.getElementById('globalMsg');
        msgDiv.textContent = text;
        msgDiv.style.display = 'block';
        msgDiv.style.backgroundColor = isError ? '#ffebee' : '#e8f5e9';
        msgDiv.style.color = isError ? '#c62828' : '#2e7d32';
    }

    function isUnicode(text) {
        const gsm7bitRegExp = /^[\x20-\x7E\xA1\xA3\xA4\xA5\xA7\xBF\xC4\xC5\xC6\xC7\xC9\xD1\xD2\xD3\xD4\xD5\xD6\xD8\xDC\xDF\xE0\xE1\xE2\xE3\xE4\xE5\xE6\xE7\xE8\xE9\xEA\xEB\xEC\xED\xEE\xEF\xF1\xF2\xF3\xF4\xF5\xF6\xF8\xF9\xFA\xFB\xFC\xFE\xDF\r\n]*$/;
        return !gsm7bitRegExp.test(text);
    }

    function updateCount() {
        const msg = document.getElementById('message').value;
        const unicodeDetected = isUnicode(msg);
        const pages = msg.length === 0 ? 0 : Math.ceil(msg.length / (unicodeDetected ? 70 : 160));
        const lagosHour = new Date().getUTCHours() + 1;
        const ratePerPage = (lagosHour >= 8 && lagosHour < 20) ? 7 : 14;
        const totalRecipients = document.getElementById('recipients').value.split(',').filter(n => n.trim().length >= 10).length;
        const totalCost = pages * ratePerPage * (totalRecipients || 1);
        
        document.getElementById('chars').innerText = msg.length;
        document.getElementById('pages').innerText = pages;
        document.getElementById('encoding-type').innerText = unicodeDetected ? "Unicode" : "GSM";
        document.getElementById('cost').innerText = "₦" + totalCost.toFixed(2);
        return { pages, totalCost };
    }

    function openPinModal() {
        if (document.getElementById('message').value.length === 0 || !document.getElementById('recipients').value.trim()) {
            return showGlobalMessage("Please enter recipients and message content.");
        }
        document.getElementById('pinError').textContent = '';
        document.getElementById('txnPin').value = '';
        document.getElementById('pinModal').style.display = 'flex';
    }

    function closePinModal() {
        document.getElementById('pinModal').style.display = 'none';
        document.getElementById('confirmBtn').style.display = 'inline-block';
        document.getElementById('processingSpinner').style.display = 'none';
    }

    function togglePinVisibility() {
        const pinInput = document.getElementById('txnPin');
        const toggleBtn = document.getElementById('toggleBtn');
        pinInput.type = (pinInput.type === "password") ? "text" : "password";
        toggleBtn.textContent = (pinInput.type === "password") ? "Show PIN" : "Hide PIN";
    }

    async function executeSmsTransaction() {
        const user = auth.currentUser;
        const enteredPin = document.getElementById('txnPin').value.trim();
        if (enteredPin.length < 4) return document.getElementById('pinError').textContent = "Enter 4 digits";

        const { pages, totalCost } = updateCount();
        document.getElementById('confirmBtn').style.display = 'none';
        document.getElementById('processingSpinner').style.display = 'block';

        try {
            const response = await fetch(`${API_BASE_URL}/api/bulksms/send-sms`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    userId: user.uid,
                    pin: enteredPin,
                    recipient: document.getElementById('recipients').value,
                    message: document.getElementById('message').value,
                    senderName: document.getElementById('senderId').value
                })
            });
            const result = await response.json();
            if (!response.ok || !result.success) throw new Error(result.error || "Transaction failed.");

            await database.ref('transactions/' + user.uid).push({
                type: 'Bulk SMS', service: `SMS (${pages} pages)`, amount: result.cost || totalCost, date: new Date().toLocaleString(), status: "Sent"
            });
            closePinModal();
            showGlobalMessage("Bulk SMS Sent Successfully!", false);
            document.getElementById('message').value = '';
            document.getElementById('recipients').value = '';
        } catch (err) {
            closePinModal();
            showGlobalMessage(err.message);
        }
    }
</script>
</body>
</html>
