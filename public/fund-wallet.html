<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fund Wallet</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.box {
  background: #fff;
  padding: 20px;
  width: 320px;
  border-radius: 10px;
}
input, button {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}
.result {
  margin-top: 15px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="box">
  <h3>Fund Wallet</h3>

  <input type="email" id="email" placeholder="Email">
  <input type="number" id="amount" placeholder="Amount">

  <button onclick="fundWallet()">Generate Account</button>

  <div class="result" id="result"></div>
</div>

<script>
async function fundWallet() {
  const email = document.getElementById("email").value;
  const amount = document.getElementById("amount").value;
  const result = document.getElementById("result");

  result.innerHTML = "Processing...";

  try {
    const res = await fetch("https://dnezerlinks-backend.onrender.com/createBillstackAccount", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, amount })
    });

    const data = await res.json();

    if (data.error) {
      result.innerHTML = "❌ Error: " + data.error;
      return;
    }

    // 🔥 SHOW ACCOUNT DETAILS
    const acct = data.data;

    result.innerHTML = `
      ✅ Account Generated<br><br>
      <b>Bank:</b> ${acct.bank_name || "N/A"}<br>
      <b>Account Number:</b> ${acct.account_number || "N/A"}<br>
      <b>Account Name:</b> ${acct.account_name || "N/A"}<br><br>
      Send exactly ₦${amount}
    `;

  } catch (err) {
    result.innerHTML = "❌ Network error";
  }
}
</script>

</body>
</html>
