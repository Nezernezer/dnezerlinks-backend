<div id="pinModal" style="display:none;">

const networkMap = { "mtn": "1", "glo": "2", "9mobile": "3", "airtel": "4" };

function updateDataTypes() {
    const network = document.getElementById('network').value;
    const dataTypeSelect = document.getElementById('dataType');
    dataTypeSelect.innerHTML = '<option value="">Choose Data Type</option>';
    if (network && groupedPlans[network]) {
        Object.keys(groupedPlans[network]).forEach(group => {
            dataTypeSelect.add(new Option(group, group));
        });
    }
    updateDataPlans();
}

function updateDataPlans() {
    const network = document.getElementById('network').value;
    const dataType = document.getElementById('dataType').value;
    const variationSelect = document.getElementById('variation');
    variationSelect.innerHTML = '<option value="">Choose Plan</option>';
    if (network && dataType && groupedPlans[network][dataType]) {
        groupedPlans[network][dataType].forEach(plan => {
            variationSelect.add(new Option(plan.name, JSON.stringify(plan)));
        });
    }
}

function openPinModal() {
    const network = document.getElementById('network').value;
    const variation = document.getElementById('variation').value;
    const phone = document.getElementById('phone').value;
    if (!network || !variation || phone.length < 11) return alert("Please fill all fields!");
    document.getElementById('pinModal').style.display = 'flex';
}

function closePinModal() { document.getElementById('pinModal').style.display = 'none'; }

async function verifyAndPay() {
    const pin = document.getElementById('txnPin').value;
    const user = auth.currentUser;
    const btn = document.getElementById('confirmBtn');
    btn.disabled = true; btn.innerText = "Processing...";
    const snap = await database.ref('users/' + user.uid).once('value');
    if (String(pin) === String(snap.val().transaction_pin)) {
        executePurchase(snap.val().balance, user.uid, JSON.parse(document.getElementById('variation').value));
    } else {
        alert("Incorrect PIN!");
        btn.disabled = false; btn.innerText = "Confirm Payment";
    }
}

async function executePurchase(balance, uid, plan) {
    const network = document.getElementById("network").value;
    const phone = document.getElementById("phone").value;
    if (balance < plan.price) return alert("Insufficient Balance");
    try {
        const response = await fetch("https://dnezerlinks-backend.onrender.com/api/data/buy", {
            method: "POST", mode: "cors",
            headers: { "Content-Type": "application/json" },
            // Key change here: dataPlanID -> dataPlan to match routes
            body: JSON.stringify({ uid, phone, dataPlan: plan.id, networkID: networkMap[network], amount: plan.price })
        });
        const res = await response.json();
        if (res.success) { 
            alert("Successful!"); 
            window.location.href = "../home.html"; 
        } else { 
            // Key change here: res.message -> res.error to match routes
            alert(res.error || "Transaction Failed"); 
            closePinModal(); 
        }
    } catch (e) { 
        alert("Network Error: Try again in 30 seconds."); 
        closePinModal(); 
    }
}
