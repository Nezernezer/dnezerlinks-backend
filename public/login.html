<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dnezerlinks | Access</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --main: #0d47a1; --warn: #f57c00; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Persistent Top Brand Header Banner */
        .top-banner {
            width: 100%;
            background: var(--main);
            color: white;
            padding: 18px 15px;
            text-align: center;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .auth-wrapper-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px 15px;
            box-sizing: border-box;
        }

        .card {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 380px;
            box-sizing: border-box;
            z-index: 10;
        }
        h2 { color: var(--main); text-align: center; margin-top: 0; margin-bottom: 5px; }
        h3 { color: #555; text-align: center; margin: 0 0 5px 0; font-size: 18px; }

        .status-msg {
            height: 45px; /* Expanded slightly for dynamic structural mobile padding balance */
            text-align: center;
            font-size: 12px;
            color: #666;
            margin-bottom: 15px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            transition: color 0.3s ease;
        }
        .status-msg.error-active {
            color: #c62828 !important;
            font-weight: 700;
        }
        .status-msg::after { content: '|'; animation: blink 0.7s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            margin-bottom: 10px;
            background: white;
            font-family: inherit;
        }
        .password-wrapper { margin: 0 0 8px 0; }
        .password-container {
            display: flex;
            align-items: center;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            padding-right: 12px;
        }
        .password-container input { border: none; flex: 1; padding: 12px 15px; margin: 0; font-size: 15px; }
        .show-label { display: flex; align-items: center; font-size: 13px; color: #666; cursor: pointer; font-weight: 600; }
        .show-label input { width: 16px; height: 16px; margin-right: 5px; }

        button {
            width: 100%; padding: 12px; background: var(--main); color: #fff;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        button:disabled { opacity: 0.5; }
        .link { text-align: center; font-size: 13px; color: var(--main); cursor: pointer; margin-top: 15px; font-weight: 600; }
        .hidden { display: none; }
        .loading { width: 100%; height: 3px; background: #eee; margin: 10px 0; display: none; overflow: hidden; }
        .bar { width: 100%; height: 100%; background: var(--warn); animation: pulse 1.2s infinite linear; }
        @keyframes pulse { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* ==================== 📞 FLOATING CONTACT MODULE STYLES ==================== */
        .contact-fab {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: var(--main);
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(13, 71, 161, 0.4);
            z-index: 3000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .contact-fab:active { transform: scale(0.92); }

        .contact-modal {
            display: none;
            position: fixed;
            z-index: 4000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }
        .contact-modal-content {
            background: white;
            margin: 20vh auto;
            padding: 25px;
            border-radius: 20px;
            width: 85%;
            max-width: 360px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }
        .contact-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        .contact-modal-header h3 { margin: 0; color: var(--main); font-size: 1.3rem; font-weight: 700; }
        .contact-close-btn { font-size: 26px; font-weight: bold; cursor: pointer; color: #888; border: none; background: none; outline: none; }
        
        .contact-channel-item {
            text-align: left;
            margin-bottom: 20px;
        }
        .contact-channel-item label {
            font-size: 11px;
            font-weight: 700;
            color: #666;
            text-transform: uppercase;
            display: block;
            margin-bottom: 4px;
        }
        .contact-channel-value {
            font-size: 14px;
            color: #222;
            font-weight: 600;
            margin-bottom: 8px;
            word-break: break-all;
        }
        .contact-action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
            transition: opacity 0.2s;
            box-sizing: border-box;
        }
        .contact-action-btn:active { opacity: 0.85; }
        .btn-email { background: #e3f2fd; color: #0D47A1; }
        .btn-whatsapp { background: #e8f5e9; color: #2e7d32; }
        .btn-call { background: #fff8e1; color: #ff8f00; }
    </style>
</head>
<body>

<div class="top-banner">Dnezerlinks</div>

<div class="auth-wrapper-container">
    <!-- LOGIN BOX -->
    <div class="card" id="loginBox">
        <h2>Dnezerlinks</h2>
        <div class="status-msg" id="loginStatus"></div>
        <input type="email" id="lEmail" placeholder="Email">
        <div class="password-wrapper">
            <div class="password-container">
                <input type="password" id="lPass" placeholder="Password">
                <label class="show-label"><input type="checkbox" onchange="togglePassword('lPass', this)"> Show</label>
            </div>
        </div>
        <div class="loading" id="lLoad"><div class="bar"></div></div>
        <button id="lBtn" onclick="handleLogin()">Login</button>
        <div class="link" onclick="toggle('regBox')">Create Account</div>
        <div class="link" onclick="toggle('forgotBox')" style="font-size: 11px; color: #888; margin-bottom: 5px;">Forgot Password?</div>
        <div class="link" onclick="toggle('recoverEmailBox')" style="font-size: 11px; color: #d32f2f; margin-top: 5px;">Forget Email?</div>
    </div>

    <!-- REGISTRATION BOX -->
    <div class="card hidden" id="regBox">
        <h2>Dnezerlinks</h2>
        <h3>Join Us</h3>
        <div class="status-msg" id="regStatus"></div>
        <input type="text" id="rName" placeholder="Full Name">
        <input type="tel" id="rPhone" placeholder="Phone Number">
        <input type="text" id="rAddress" placeholder="Home Address">
        <input type="email" id="rEmail" placeholder="Email">
        <div class="password-wrapper">
            <div class="password-container">
                <input type="password" id="rPass" placeholder="Password (min 6 chars)">
                <label class="show-label"><input type="checkbox" onchange="togglePassword('rPass', this)"> Show</label>
            </div>
        </div>
        <div class="loading" id="rLoad"><div class="bar"></div></div>
        <button id="rBtn" onclick="handleRegister()">Sign Up</button>
        <div class="link" onclick="toggle('loginBox')">Back to Login</div>
    </div>

    <!-- FORGOT PASSWORD BOX -->
    <div class="card hidden" id="forgotBox">
        <h2>Reset</h2>
        <input type="email" id="fEmail" placeholder="Your Email">
        <div class="loading" id="fLoad"><div class="bar"></div></div>
        <button onclick="handleReset()">Send Reset Link</button>
        <div class="link" onclick="toggle('loginBox')">Back</div>
    </div>

    <!-- EMAIL RECOVERY BOX -->
    <div class="card hidden" id="recoverEmailBox">
        <h2>Recover Email</h2>
        <div class="status-msg" id="recoverEmailStatus"></div>
        <input type="text" id="recFullName" placeholder="Full Name on Account">
        <select id="recGender">
            <option value="" disabled selected>Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>
        <input type="tel" id="recPhone" placeholder="Phone Number">
        <input type="email" id="recSuspectedEmail" placeholder="Suspected Email (Optional)">
        <button onclick="handleRecoverEmailSubmit()">Submit Review Request</button>
        <div class="link" onclick="toggle('loginBox')">Back to Login</div>
    </div>
</div>

<button class="contact-fab" onclick="openContactModal()">📞</button>

<div id="contactModal" class="contact-modal">
    <div class="contact-modal-content">
        <div class="contact-modal-header">
            <h3>CONTACT US</h3>
            <button class="contact-close-btn" onclick="closeContactModal()">&times;</button>
        </div>
        
        <div class="contact-channel-item">
            <label>Email Address</label>
            <div class="contact-channel-value">dnezerlinks@gmail.com</div>
            <a href="mailto:dnezerlinks@gmail.com" class="contact-action-btn btn-email">✉️ Send Email</a>
        </div>

        <div class="contact-channel-item">
            <label>Whatsapp Connection</label>
            <div class="contact-channel-value">08117776509</div>
            <a href="https://wa.me/2348117776509" target="_blank" class="contact-action-btn btn-whatsapp">💬 Chat on WhatsApp</a>
        </div>

        <div class="contact-channel-item">
            <label>Phone Hotlines</label>
            <div class="contact-channel-value">08117776509</div>
            <a href="tel:08117776509" class="contact-action-btn btn-call">📞 Call Center</a>
        </div>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyAXWh3ls4yEANmGy4g7xZ8jlBN0KoFC5yc",
        authDomain: "dnezerlinks.firebaseapp.com",
        databaseURL: "https://dnezerlinks-default-rtdb.firebaseio.com",
        projectId: "dnezerlinks-vtu"
    };
    firebase.initializeApp(config);
    const auth = firebase.auth();
    const db = firebase.database();

    // --- Dynamic Typing Logic ---
    let currentText = "Please login with your details below";
    let displayedText = "";
    let charIdx = 0;
    let isDeleting = false;
    let activeStatusId = "loginStatus";
    let errorHoldTimeout = null;
    let fallbackStoredText = "";

    function runTyping() {
        const statusEl = document.getElementById(activeStatusId);
        if (!statusEl) return;

        if (!isDeleting) {
            displayedText = currentText.substring(0, charIdx++);
            if (charIdx > currentText.length) {
                setTimeout(runTyping, 2500);
                isDeleting = true;
                return;
            }
        } else {
            displayedText = currentText.substring(0, charIdx--);
            if (charIdx < 0) { isDeleting = false; charIdx = 0; }
        }
        statusEl.innerText = displayedText;
        setTimeout(runTyping, isDeleting ? 30 : 50);
    }

    function setStatus(msg, isCustomError = false) {
        if (errorHoldTimeout) {
            if (!isCustomError) {
                fallbackStoredText = msg;
                return;
            }
            clearTimeout(errorHoldTimeout);
            errorHoldTimeout = null;
        }

        const statusEl = document.getElementById(activeStatusId);
        if (isCustomError && statusEl) {
            statusEl.classList.add('error-active');
            if (activeStatusId === "loginStatus") {
                fallbackStoredText = "Please login with your details below";
            } else if (activeStatusId === "regStatus") {
                fallbackStoredText = "Welcome, please touch any field below for me to guide you.";
            } else {
                fallbackStoredText = "Provide details below to review your missing registration credentials.";
            }

            currentText = msg;
            charIdx = 0;
            isDeleting = false;

            errorHoldTimeout = setTimeout(() => {
                if (statusEl) statusEl.classList.remove('error-active');
                errorHoldTimeout = null;
                currentText = fallbackStoredText;
                charIdx = 0;
                isDeleting = false;
            }, 10000);
            return;
        }

        if(currentText === msg) return;
        currentText = msg;
        charIdx = 0;
        isDeleting = false;
    }

    // Input Focus Listeners (Login)
    document.getElementById('lEmail').addEventListener('focus', () => setStatus("Please enter your email address here e.g. Dnezerlinks@mail.com"));
    document.getElementById('lPass').addEventListener('focus', () => setStatus("Please enter your password here. Do not share the password."));
    document.getElementById('lEmail').addEventListener('blur', () => setStatus("Please login with your details below"));
    document.getElementById('lPass').addEventListener('blur', () => setStatus("Please login with your details below"));

    // Input Focus Listeners (Register)
    document.getElementById('rName').addEventListener('focus', () => setStatus("Enter your full name. Separate names with space here. Eg John Doe Meg."));
    document.getElementById('rPhone').addEventListener('focus', () => setStatus("Enter your active phone number here."));
    document.getElementById('rAddress').addEventListener('focus', () => setStatus("Please enter your house address in full."));
    document.getElementById('rEmail').addEventListener('focus', () => setStatus("Please enter an active email as it will be used to retrieve password if forgotten. Eg johndoe@dnezer.com "));
    document.getElementById('rPass').addEventListener('focus', () => setStatus("Please create a strong password eg Abcq19@ "));

    // Reset to welcome when blur on register fields
    ['rName', 'rPhone', 'rAddress', 'rEmail', 'rPass'].forEach(id => {
        document.getElementById(id).addEventListener('blur', () => setStatus("Welcome, please touch any field below for me to guide you."));
    });

    // Input Focus Listeners (Email Recovery Form)
    document.getElementById('recFullName').addEventListener('focus', () => setStatus("Provide the legal Full Name matching your Dnezerlinks profile records."));
    document.getElementById('recGender').addEventListener('focus', () => setStatus("Select your preferred identity gender type profile marker."));
    document.getElementById('recPhone').addEventListener('focus', () => setStatus("Provide the structural registered account phone line contact details."));
    document.getElementById('recSuspectedEmail').addEventListener('focus', () => setStatus("Optional: Type in any email variations you might have structured previously."));
    
    ['recFullName', 'recGender', 'recPhone', 'recSuspectedEmail'].forEach(id => {
        document.getElementById(id).addEventListener('blur', () => setStatus("Provide details below to review your missing registration credentials."));
    });

    runTyping();

    // Floating Modal Interactive Scripts
    function openContactModal() {
        document.getElementById('contactModal').style.display = "block";
    }
    function closeContactModal() {
        document.getElementById('contactModal').style.display = "none";
    }

    function toggle(id) {
        if (errorHoldTimeout) {
            clearTimeout(errorHoldTimeout);
            errorHoldTimeout = null;
        }
        document.querySelectorAll('.status-msg').forEach(el => el.classList.remove('error-active'));
        document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');

        if(id === 'loginBox') {
            activeStatusId = "loginStatus";
            currentText = "Please login with your details below.";
            charIdx = 0; isDeleting = false;
        } else if(id === 'regBox') {
            activeStatusId = "regStatus";
            currentText = "Welcome, please touch any field below for me to guide you.";
            charIdx = 0; isDeleting = false;
        } else if(id === 'recoverEmailBox') {
            activeStatusId = "recoverEmailStatus";
            currentText = "Provide details below to review your missing registration credentials.";
            charIdx = 0; isDeleting = false;
        }
    }

    function togglePassword(inputId, checkbox) {
        const input = document.getElementById(inputId);
        input.type = checkbox.checked ? "text" : "password";
    }

    // Handle Email Recovery Submission with smart WhatsApp fallback
    function handleRecoverEmailSubmit() {
        const fullName = document.getElementById('recFullName').value.trim();
        const gender = document.getElementById('recGender').value;
        const phone = document.getElementById('recPhone').value.trim();
        const suspectedEmail = document.getElementById('recSuspectedEmail').value.trim() || "Not Provided";

        if (!fullName || !gender || !phone) {
            setStatus("Form Error: Please provide Full Name, Gender, and your Phone Number!", true);
            return;
        }

        const messageText = 
            "Hello Dnezerlinks Support,\n\n" +
            "I need assistance recovering the linked login email address for my account.\n\n" +
            "--- ACCOUNT VERIFICATION INFORMATION ---\n" +
            "Full Name: " + fullName + "\n" +
            "Gender Indicator: " + gender + "\n" +
            "Registered Phone Number: " + phone + "\n" +
            "Suspected Profile Email Address: " + suspectedEmail + "\n\n" +
            "Please review my records and reach out via phone/mail to restore dashboard operations.";

        const subject = encodeURIComponent("Dnezerlinks Profile Email Recovery Review Request");
        const body = encodeURIComponent(messageText);

        let emailAppOpened = false;

        // Listen for window blur event to see if an email app handles it
        const checkBlur = () => { emailAppOpened = true; };
        window.addEventListener('blur', checkBlur);

        // Attempt opening native email application
        window.location.href = "mailto:dnezerlinks@gmail.com?subject=" + subject + "&body=" + body;

        // Trigger WhatsApp routing fallback if the window is still focused after 1500ms
        setTimeout(() => {
            window.removeEventListener('blur', checkBlur);
            if (!emailAppOpened) {
                const whatsappUrl = "https://wa.me/2348117776509?text=" + encodeURIComponent(messageText);
                window.open(whatsappUrl, '_blank');
            }
        }, 1500);
    }

    // Handle Auth logic
    async function handleLogin() {
        const email = document.getElementById('lEmail').value.trim();
        const pass = document.getElementById('lPass').value;
        if(!email || !pass) {
            setStatus("Error: All calculation input fields must be completely filled!", true);
            return;
        }
        document.getElementById('lLoad').style.display = 'block';
        document.getElementById('lBtn').disabled = true;
        try {
            await auth.signInWithEmailAndPassword(email, pass);
            localStorage.setItem('userEmail', email);
            window.location.href = "home.html";
        } catch (err) {
            setStatus("Login Failed: " + err.message, true);
            document.getElementById('lLoad').style.display = 'none';
            document.getElementById('lBtn').disabled = false;
        }
    }

    async function handleRegister() {
        const name = document.getElementById('rName').value.trim();
        const phone = document.getElementById('rPhone').value.trim();
        const address = document.getElementById('rAddress').value.trim();
        const email = document.getElementById('rEmail').value.trim();
        const pass = document.getElementById('rPass').value;

        if(!name || !phone || !address || !email || pass.length < 6) {
            setStatus("Registration Error: Please ensure all details are fully completed and password is min 6 characters.", true);
            return;
        }

        document.getElementById('rLoad').style.display = 'block';
        document.getElementById('rBtn').disabled = true;

        try {
            const res = await auth.createUserWithEmailAndPassword(email, pass);
            await db.ref('users/' + res.user.uid).set({
                name, email, phone, address,
                balance: 0, account_status: "active", joined: Date.now()
            });
            window.location.href = "home.html";
        } catch (e) {
            setStatus("Registration Failed: " + e.message, true);
            document.getElementById('rLoad').style.display = 'none';
            document.getElementById('rBtn').disabled = false;
        }
    }

    async function handleReset() {
        const email = document.getElementById('fEmail').value.trim();
        if(!email) return alert("Enter email");
        document.getElementById('fLoad').style.display = 'block';
        try {
            await auth.sendPasswordResetEmail(email);
            alert("Reset link sent!");
            toggle('loginBox');
        } catch (e) { alert(e.message); }
        document.getElementById('fLoad').style.display = 'none';
    }

    window.onclick = function(event) {
        const modal = document.getElementById('contactModal');
        if (event.target == modal) {
            closeContactModal();
        }
    }
</script>
</body>
</html>
