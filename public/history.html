<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transaction History - Dnezerlinks</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #0d47a1; --success: #2e7d32; --danger: #c62828; --light: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding-bottom: 30px; color: #333; }

        .header { background: var(--primary); color: white; padding: 25px 15px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header h2 { margin: 0; font-size: 20px; letter-spacing: 1px; }

        .container { padding: 15px; max-width: 500px; margin: auto; }

        /* Transaction Cards */
        .card {
            background: white; padding: 15px; border-radius: 12px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.05); margin-bottom: 12px;
            border-left: 5px solid var(--primary); cursor: pointer;
            transition: transform 0.1s;
        }
        .card:active { transform: scale(0.97); }
        .card-top { display: flex; justify-content: space-between; align-items: center; }
        .card-title { font-weight: 700; font-size: 14px; color: var(--primary); text-transform: uppercase; }
        .card-date { font-size: 11px; color: #888; }
        .card-amt { font-size: 18px; font-weight: 800; margin: 8px 0; color: #222; }
        .card-sub { font-size: 12px; color: #666; font-weight: 500; }

        /* Pagination Styling */
        .pagination { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px; }
        .page-btn { color: var(--primary); font-weight: 700; cursor: pointer; font-size: 14px; user-select: none; }
        .page-btn.disabled { color: #ccc; cursor: not-allowed; }

        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
        .modal-content {
            background: white; margin: 10% auto; padding: 25px; border-radius: 20px;
            width: 88%; max-width: 380px; position: relative; box-sizing: border-box;
        }
        .receipt-header { text-align: center; border-bottom: 1px dashed #ccc; padding-bottom: 15px; margin-bottom: 15px; }
        .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f1f1f1; font-size: 14px; }
        .detail-label { color: #777; font-weight: 500; }
        .detail-value { font-weight: 700; color: #222; text-align: right; }

        .action-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 25px; }
        .action-row-btns { display: flex; gap: 12px; width: 100%; }
        .btn { flex: 1; padding: 13px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; font-size: 14px; text-align: center; }
        .btn-print { background: var(--primary); color: white; }
        .btn-share { background: #e3f2fd; color: var(--primary); }
        .btn-close { background: #eee; color: #555; }
        
        .btn-view-pins { background: #2e7d32; color: white; width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; font-size: 14px; text-transform: uppercase; box-shadow: 0 3px 6px rgba(46,125,50,0.2); }
        .btn-view-pins:active { background: #1b5e20; }

        /* Typing Animation System */
        .no-history { text-align: center; padding: 40px 20px; color: #666; font-weight: 600; min-height: 20px; }
        .typing::after { content: '|'; animation: blink 0.7s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .btn-home { display: block; text-align: center; color: var(--primary); font-weight: 700; text-decoration: none; margin-top: 10px; padding: 10px; }

        /* --- OPTIMIZED MULTI-FORMAT PRINT ENGINE --- */
        #printArea { display: none; background: white; padding: 0; margin: 0; width: 100%; }
        
        .tickets-grid.layout-a4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; max-width: 100%; padding: 0; box-sizing: border-box; }
        .tickets-grid.layout-pos { display: flex; flex-direction: column; gap: 15px; max-width: 58mm; margin: 0 auto; padding: 5px; box-sizing: border-box; }

        .pin-ticket { border: 1px solid #333; padding: 3px 5px; background: #fff; border-radius: 4px; box-sizing: border-box; page-break-inside: avoid; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; position: relative; line-height: 1.0; }
        
        .layout-a4 .pin-ticket { height: 28mm; }
        .layout-pos .pin-ticket { height: auto; padding: 10px 6px; border-bottom: 2px dashed #000; border-top: none; border-left: none; border-right: none; border-radius: 0; }

        .ticket-top-wrapper { display: flex; justify-content: center; align-items: center; width: 100%; margin-bottom: 0px; line-height: 1.0; }
        .ticket-header { font-weight: 900; font-size: 12px; color: #000; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.0; text-align: center; width: 100%; padding: 0 22px; box-sizing: border-box; }
        
        .layout-pos .ticket-header { font-size: 15px; }

        .ticket-brand { font-size: 10px; font-weight: 800; color: #0d47a1; margin: 0 0 1px 0; white-space: nowrap; line-height: 1.0; text-align: center; }
        .layout-pos .ticket-brand { font-size: 13px; margin: 4px 0; }
        
        .pin-row { display: flex; align-items: center; justify-content: center; gap: 4px; line-height: 1.0; margin: 0; padding: 0; background: none; border: none; }
        .pin-label { font-size: 8px; color: #444; font-weight: bold; text-transform: uppercase; line-height: 1.0; }
        .layout-pos .pin-label { font-size: 11px; }

        .pin-code { font-size: 13px; font-weight: 900; color: #000; letter-spacing: 0.2px; line-height: 1.0; }
        .layout-pos .pin-code { font-size: 18px; letter-spacing: 0.5px; margin: 4px 0; }
        
        .serial-row { font-size: 8px; font-weight: 800; color: #222; line-height: 1.0; margin: 0 0 1px 0; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .layout-pos .serial-row { font-size: 10px; margin: 2px 0; }

        .ticket-footer { font-size: 8.5px; color: #111; line-height: 1.1; border-top: none; padding-top: 0px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 700; }
        .layout-pos .ticket-footer { font-size: 10px; line-height: 1.3; white-space: normal; }

        .ticket-timestamp { font-size: 7.5px; color: #333; margin-top: 1px; font-weight: bold; line-height: 1.0; }
        .layout-pos .ticket-timestamp { font-size: 9px; margin-top: 3px; }

        /* Logos */
        .logo-box { position: absolute; top: 3px; right: 4px; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; overflow: hidden; box-sizing: border-box; }
        .layout-pos .logo-box { width: 22px; height: 22px; top: 6px; right: 2px; }
        
        .logo-mtn { background: #ffcc00; border: 1px solid #000; border-radius: 50%; }
        .logo-mtn::before { content: "MTN"; color: #000; font-size: 5px; font-family: 'Arial Black', sans-serif; font-weight: 900; transform: scale(0.8); }
        .layout-pos .logo-mtn::before { font-size: 6px; }

        .logo-glo { background: radial-gradient(circle at 35% 35%, #a6df20, #008543); border-radius: 50%; border: 0.5px solid #005a2c; }
        .logo-glo::before { content: "glo"; color: #fff; font-size: 8.5px; font-family: 'Arial', sans-serif; font-style: italic; font-weight: 900; letter-spacing: -0.5px; transform: translateY(-0.5px); }
        .layout-pos .logo-glo::before { font-size: 10px; }

        .logo-airtel { background: #e50000; border-radius: 4px; }
        .logo-airtel::before { content: "Airtel"; color: #fff; font-size: 11px; font-family: sans-serif; font-weight: 900; transform: translateY(-1.5px); }
        .layout-pos .logo-airtel::before { font-size: 11px; }

        .logo-9mobile { background: #002d24; border-radius: 3px; border-left: 3.5px solid #b3c100; }
        .logo-9mobile::before { content: "9mobile"; color: #b3c100; font-size: 6px; font-family: sans-serif; font-weight: 900; transform: scale(0.9) translateX(-0.5px); }

        .paper-selector-bar { background: #eef2f7; border: 1px solid #dcdfe6; padding: 10px; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 10px; max-width: 400px; margin: 15px auto; font-size: 13px; font-weight: bold; }
        .paper-selector-bar select { flex: 1; padding: 8px; border-radius: 6px; font-weight: bold; border: 1px solid #b4bccc; background: white; }

        @media print {
            body { background: white; margin: 0; padding: 0; }
            body:not(.printing-vouchers) .header, body:not(.printing-vouchers) .btn-home, body:not(.printing-vouchers) .action-btns, body:not(.printing-vouchers) .btn-close, body:not(.printing-vouchers) #history-list, body:not(.printing-vouchers) .pagination { display: none !important; }
            body:not(.printing-vouchers) .modal { position: absolute; background: white; display: block !important; }
            body:not(.printing-vouchers) .modal-content { margin: 0; width: 100%; border: none; box-shadow: none; padding: 0; }
            
            body.printing-vouchers #appLayoutContainer, body.printing-vouchers .modal, body.printing-vouchers #printControlsEngine, body.printing-vouchers #paperSelectionControl { display: none !important; }
            body.printing-vouchers #printArea { display: block !important; position: absolute; left: 0; top: 0; margin: 0; padding: 0; width: 100%; }
        }
    </style>
</head>
<body>

<div id="appLayoutContainer">
    <div class="header">
        <h2>TRANSACTION HISTORY</h2>
    </div>

    <div class="container">
        <div id="history-list">
            <div class="no-history typing" id="loadingText"></div>
        </div>

        <div class="pagination">
            <div class="page-btn disabled" id="prevBtn" onclick="changePage(-1)">← Previous</div>
            <div id="pageInfo" style="font-size: 11px; color: #888;">Page 1</div>
            <div class="page-btn disabled" id="nextBtn" onclick="changePage(1)">Next →</div>
        </div>

        <a href="home.html" class="btn-home">Back to Dashboard</a>
    </div>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <div class="receipt-header">
            <div style="font-size: 30px;">🧾</div>
            <h3 style="margin: 5px 0; color: var(--primary);">Transaction Receipt</h3>
            <div id="detStatus" style="font-weight: 800; font-size: 14px;">SUCCESSFUL</div>
        </div>
        <div id="receipt-body">
            <div class="detail-row"><span class="detail-label">Service</span><span class="detail-value" id="detService">---</span></div>
            <div class="detail-row"><span class="detail-label">Network</span><span class="detail-value" id="detNetwork">---</span></div>
            <div class="detail-row"><span class="detail-label">Target Details</span><span class="detail-value" id="detPhone">---</span></div>
            <div class="detail-row"><span class="detail-label">Trans. Type</span><span class="detail-value" id="detType">---</span></div>
            <div class="detail-row"><span class="detail-label">Amount</span><span class="detail-value" id="detAmount">₦0.00</span></div>
            <div class="detail-row"><span class="detail-label">Date & Time</span><span class="detail-value" id="detDate">---</span></div>
            <div class="detail-row" style="border:none;"><span class="detail-label">Reference</span><span class="detail-value" id="detRef" style="font-size: 10px;">---</span></div>
        </div>
        <div class="action-btns">
            <div id="historyPinsButtonContainer" style="width: 100%;"></div>
            <div class="action-row-btns">
                <button class="btn btn-share" onclick="shareReceipt()">Share</button>
                <button class="btn btn-print" onclick="triggerStandardPrint()">Print</button>
                <button class="btn btn-close" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>
</div>

<div id="printArea">
    <div id="paperSelectionControl" class="paper-selector-bar">
        <span>📄 Paper Type:</span>
        <select id="paperTypeSelector" onchange="switchPaperLayoutProfile()">
            <option value="a4">Standard A4 Sheet (4-Column Grid)</option>
            <option value="pos">Thermal POS Receipt (Continuous Roll)</option>
        </select>
    </div>

    <div id="ticketsWrapper"></div>
    
    <div id="printControlsEngine" style="display: flex; gap: 12px; max-width: 400px; margin: 25px auto; padding: 0 15px; box-sizing: border-box;">
        <button style="flex: 1; background: #2e7d32; color: white; padding: 14px; border: none; border-radius: 10px; font-weight: 800; font-size: 14px; cursor: pointer; box-shadow: 0 4px 10px rgba(46,125,50,0.3);" onclick="executeVoucherPrint()">🖨️ PRINT SHEET</button>
        <button style="flex: 1; background: #c62828; color: white; padding: 14px; border: none; border-radius: 10px; font-weight: 800; font-size: 14px; cursor: pointer; box-shadow: 0 4px 10px rgba(198,40,40,0.3);" onclick="exitVoucherPrintCanvas()">❌ CLOSE SHEET</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAXWh3ls4yEANmGy4g7xZ8jlBN0KoFC5yc",
        authDomain: "dnezerlinks.firebaseapp.com",
        databaseURL: "https://dnezerlinks-default-rtdb.firebaseio.com",
        projectId: "dnezerlinks",
        appId: "1:1028450580168:web:d7a48462a128f02aa657fd"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    let allRecords = [];
    let currentPage = 1;
    const recordsPerPage = 40;
    let selectedTx = null;

    const loadingEl = document.getElementById('loadingText');
    const loadMsg = "Loading your transactions... please wait";
    let charIdx = 0;
    let isTyping = true;

    function typeEffect() {
        if (!isTyping || !loadingEl) return;
        loadingEl.innerText = loadMsg.substring(0, charIdx);
        charIdx++;
        if (charIdx > loadMsg.length) {
            setTimeout(() => { charIdx = 0; typeEffect(); }, 1500);
        } else {
            setTimeout(typeEffect, 80);
        }
    }
    typeEffect();

    function formatMyDate(timestamp, fallBackDateString) {
        if (timestamp && !isNaN(timestamp) && Number(timestamp) > 0) {
            const d = new Date(Number(timestamp));
            if (!isNaN(d.getTime())) {
                return d.toLocaleString('en-NG', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true });
            }
        }
        return fallBackDateString || "Recently";
    }

    function parseMetaData(tx) {
        try {
            const desc = String(tx.description || tx.desc || "").toUpperCase();
            const serviceNode = String(tx.service || "").toUpperCase();
            const typeNode = String(tx.type || "").toUpperCase();

            let data = {
                service: "Transaction Ledger",
                network: "N/A",
                phone: tx.phone || tx.mobile_number || tx.number || "N/A",
                type: (typeNode === 'CREDIT' || tx.type === 'credit') ? "Credit" : "Debit"
            };

            if (typeNode === "RECHARGE PIN" || serviceNode.includes("PIN") || desc.includes("PIN") || desc.includes("VOUCHER")) {
                data.service = "Recharge PIN";
                if (data.phone === "N/A" && tx.service) {
                    data.phone = tx.service;
                }
            } else if (desc.includes("AIRTIME") || serviceNode.includes("AIRTIME")) {
                data.service = "Airtime Top-up";
		} else if (desc.includes("SMS") || serviceNode.includes("SMS")) {
                data.service = "Sms";
            } else if (desc.includes("DATA") || serviceNode.includes("DATA")) {
                data.service = "Data Bundle";
            } else if (serviceNode.includes("CABLE") || desc.includes("CABLE") || desc.includes("SUBSCRIPTION") || desc.includes("GOTV") || desc.includes("DSTV")) {
                data.service = "Cable TV Sub";
            } else if (data.type === "Credit" || desc.includes("WALLET") || desc.includes("FUNDED") || desc.includes("DEPOSIT")) {
                data.service = "Wallet Funding";
                data.type = "Credit";
                if (data.phone === "N/A") {
                    data.phone = tx.reference || tx.id || "Ref Ledger";
                }
            }

            if (serviceNode.includes("MTN") || desc.includes("MTN") || tx.network === "1") data.network = "MTN";
            else if (serviceNode.includes("GLO") || desc.includes("GLO") || tx.network === "2") data.network = "GLO";
            else if (serviceNode.includes("9MOBILE") || desc.includes("9MOBILE") || tx.network === "3") data.network = "9MOBILE";
            else if (serviceNode.includes("AIRTEL") || desc.includes("AIRTEL") || tx.network === "4") data.network = "AIRTEL";

            return data;
        } catch (e) {
            return { service: "Transaction Record", network: "N/A", phone: "Details", type: "Debit" };
        }
    }

    auth.onAuthStateChanged(user => {
        if (!user) return window.location.href = 'login.html';

        db.ref('transactions/' + user.uid).on('value', snap => {
            isTyping = false;
            allRecords = [];
            
            if (!snap.exists()) {
                document.getElementById('history-list').innerHTML = '<div class="no-history">No history available yet.</div>';
                return;
            }

            snap.forEach(c => {
                const val = c.val();
                if (val) {
                    let calculatedSortTime = 0;
                    if (val.timestamp && !isNaN(val.timestamp)) {
                        calculatedSortTime = Number(val.timestamp);
                    } else if (val.date) {
                        const parsedDate = new Date(val.date);
                        calculatedSortTime = isNaN(parsedDate.getTime()) ? 0 : parsedDate.getTime();
                    }

                    allRecords.push({
                        id: c.key,
                        ...val,
                        sortTime: calculatedSortTime
                    });
                }
            });

            allRecords.sort((a, b) => b.sortTime - a.sortTime);
            renderPage();
        });
    });

    function renderPage() {
        const list = document.getElementById('history-list');
        if (!list) return;
        list.innerHTML = '';

        const start = (currentPage - 1) * recordsPerPage;
        const end = start + recordsPerPage;
        const pageItems = allRecords.slice(start, end);

        if (pageItems.length === 0) {
            list.innerHTML = '<div class="no-history">No history available yet.</div>';
            return;
        }

        pageItems.forEach(tx => {
            try {
                const meta = parseMetaData(tx);
                const isCredit = meta.type === "Credit";
                const card = document.createElement('div');
                card.className = 'card';
                card.style.borderLeftColor = isCredit ? 'var(--success)' : 'var(--primary)';
                card.onclick = () => showDetails(tx);

                card.innerHTML = `
                    <div class="card-top">
                        <span class="card-title">${meta.service}</span>
                        <span class="card-date">${formatMyDate(tx.timestamp, tx.date)}</span>
                    </div>
                    <div class="card-amt" style="color: ${isCredit ? 'var(--success)' : '#222'}">
                        ${isCredit ? '+' : '-'}₦${parseFloat(tx.amount || 0).toLocaleString()}
                    </div>
                    <div class="card-sub">${meta.network !== 'N/A' ? meta.network + ' | ' : ''}${meta.phone}</div>
                `;
                list.appendChild(card);
            } catch (err) {}
        });

        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageInfo = document.getElementById('pageInfo');

        if (prevBtn) prevBtn.className = currentPage === 1 ? 'page-btn disabled' : 'page-btn';
        if (nextBtn) nextBtn.className = end >= allRecords.length ? 'page-btn disabled' : 'page-btn';
        if (pageInfo) pageInfo.innerText = `Page ${currentPage} of ${Math.ceil(allRecords.length / recordsPerPage) || 1}`;
    }

    function changePage(dir) {
        const newPage = currentPage + dir;
        if (newPage < 1 || (newPage - 1) * recordsPerPage >= allRecords.length) return;
        currentPage = newPage;
        renderPage();
        window.scrollTo(0,0);
    }

    function showDetails(tx) {
        try {
            selectedTx = tx;
            const meta = parseMetaData(tx);
            document.getElementById('detStatus').innerText = String(tx.status || "SUCCESSFUL").toUpperCase();
            document.getElementById('detService').innerText = meta.service;
            document.getElementById('detNetwork').innerText = meta.network;
            document.getElementById('detPhone').innerText = meta.phone;
            document.getElementById('detType').innerText = meta.type;
            document.getElementById('detAmount').innerText = "₦" + parseFloat(tx.amount || 0).toLocaleString();
            document.getElementById('detDate').innerText = formatMyDate(tx.timestamp, tx.date);
            document.getElementById('detRef').innerText = tx.reference || tx.id;
            
            const btnContainer = document.getElementById('historyPinsButtonContainer');
            btnContainer.innerHTML = ''; 

            if (meta.service === "Recharge PIN") {
                const viewPinsBtn = document.createElement('button');
                viewPinsBtn.className = 'btn-view-pins';
                viewPinsBtn.innerHTML = '👁️ VIEW & PRINT RECHARGE PINS';
                viewPinsBtn.onclick = () => launchVoucherEngine();
                btnContainer.appendChild(viewPinsBtn);
            }

            document.getElementById('detailModal').style.display = 'block';
        } catch (err) {}
    }

    function closeModal() {
        const modal = document.getElementById('detailModal');
        if (modal) modal.style.display = 'none';
    }

    function shareReceipt() {
        if (!selectedTx) return;
        const meta = parseMetaData(selectedTx);
        const text = `*Dnezerlinks Receipt*\n\nService: ${meta.service}\nAmount: ₦${parseFloat(selectedTx.amount || 0).toLocaleString()}\nTarget: ${meta.phone}\nDate: ${formatMyDate(selectedTx.timestamp, selectedTx.date)}\n\n_Thank you for choosing Dnezerlinks!_`;
        if (navigator.share) {
            navigator.share({ title: 'Receipt', text: text });
        } else {
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
        }
    }

    function triggerStandardPrint() {
        document.body.classList.remove('printing-vouchers');
        window.print();
    }

    function launchVoucherEngine() {
        if (!selectedTx) return;
        document.getElementById('paperTypeSelector').value = 'a4';
        buildVoucherCanvas('a4');
    }

    function switchPaperLayoutProfile() {
        const selectedPaperFormat = document.getElementById('paperTypeSelector').value;
        buildVoucherCanvas(selectedPaperFormat);
    }

    function buildVoucherCanvas(profileMode) {
        const targetPins = selectedTx.pins || selectedTx.pin_details || selectedTx.pin;
        if (!targetPins) {
            alert("❌ No PIN data found in this transaction record.");
            return;
        }

        document.getElementById('appLayoutContainer').style.display = 'none';
        document.getElementById('detailModal').style.display = 'none';

        const wrapper = document.getElementById('ticketsWrapper');
        wrapper.innerHTML = '';

        const gridContainer = document.createElement('div');
        gridContainer.className = `tickets-grid layout-${profileMode}`;

        const meta = parseMetaData(selectedTx);
        const corporateHeaderBrand = selectedTx.brandName || "DNEZERLINKS";
        const txDateString = formatMyDate(selectedTx.timestamp, selectedTx.date);
        
        let targetNetwork = meta.network !== 'N/A' ? meta.network : 'MTN';
        let logoClass = 'logo-mtn';
        let loadUssd = '*311*PIN#';
        let customerCare = '300'; 

        if (targetNetwork === 'GLO') logoClass = 'logo-glo';
        else if (targetNetwork === 'AIRTEL') logoClass = 'logo-airtel';
        else if (targetNetwork === '9MOBILE') logoClass = 'logo-9mobile';

        let finalPinsArray = [];
        if (Array.isArray(targetPins)) {
            finalPinsArray = targetPins;
        } else if (typeof targetPins === 'object') {
            finalPinsArray = Object.values(targetPins);
        } else if (typeof targetPins === 'string') {
            if (targetPins.includes(',')) {
                finalPinsArray = targetPins.split(',').map(p => ({ pin: p.trim(), serial: 'N/A' }));
            } else {
                finalPinsArray.push({ pin: targetPins, serial: selectedTx.serial || 'N/A' });
            }
        }

        finalPinsArray.forEach(item => {
            const voucherPinValue = item.pin || item.pin_code || (typeof item === 'string' ? item : 'N/A');
            const voucherSerialValue = item.serial || item.serial_number || selectedTx.serial || 'N/A';
            const individualCardAmount = selectedTx.pinAmount || selectedTx.amount || '0';

            const ticketCard = document.createElement('div');
            ticketCard.className = 'pin-ticket';
            ticketCard.innerHTML = `
                <div class="ticket-top-wrapper">
                    <div class="ticket-header">${corporateHeaderBrand}</div>
                    <div class="logo-box ${logoClass}"></div>
                </div>
                <div class="ticket-brand">${targetNetwork} ₦${parseFloat(individualCardAmount).toLocaleString()}</div>
                <div class="pin-row">
                    <span class="pin-label">PIN:</span>
                    <span class="pin-code">${voucherPinValue}</span>
                </div>
                <div class="serial-row">Serial Number: ${voucherSerialValue}</div>
                <div class="ticket-footer">
                    Load: ${loadUssd} | Customer Care: ${customerCare}
                    <div class="ticket-timestamp">${txDateString}</div>
                </div>
            `;
            gridContainer.appendChild(ticketCard);
        });

        wrapper.appendChild(gridContainer);
        document.getElementById('printArea').style.display = 'block';
        window.scrollTo(0, 0);
    }

    function executeVoucherPrint() {
        document.body.classList.add('printing-vouchers');
        window.print();
    }

    function exitVoucherPrintCanvas() {
        document.body.classList.remove('printing-vouchers');
        document.getElementById('printArea').style.display = 'none';
        document.getElementById('appLayoutContainer').style.display = 'block';
        document.getElementById('detailModal').style.display = 'block';
    }

    window.onclick = e => { if (e.target.className === 'modal') closeModal(); };
</script>
</body>
</html>
