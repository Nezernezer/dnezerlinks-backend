<script>
    firebase.auth().onAuthStateChanged(user => {
        if (user) {
            const userRef = db.ref(`users/${user.uid}`);
            userRef.on('value', snap => {
                const data = snap.val() || {};
                if (data.account_number) {
                    document.getElementById('wallet-balance').innerText = "₦" + data.balance.toFixed(2);
                    document.getElementById('acc-number').innerText = data.account_number;
                    document.getElementById('acc-name').innerText = "Dnezerlinks-" + (data.name || "User");
                    // Show UI logic here
                } else {
                    // Trigger backend /get-virtual-account here
                }
            });
        }
    });
</script>
