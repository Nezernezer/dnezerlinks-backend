<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fund Wallet - Dnezerlinks</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .acc-info { margin-top: 20px; padding: 15px; background: #e7f3ff; border-radius: 8px; border: 1px solid #b3d7ff; }
        .label { font-size: 12px; color: #666; }
        .value { font-size: 18px; font-weight: bold; color: #007bff; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>Fund Your Wallet</h2>
    <p>Transfer to your dedicated PalmPay account below to fund your wallet instantly.</p>

    <div id="account-details-container" class="acc-info">
        <span class="label">Bank Name</span>
        <span id="bankName" class="value">Loading...</span>

        <span class="label">Account Number</span>
        <span id="accNumber" class="value">----------</span>

        <span class="label">Account Name</span>
        <span id="accName" class="value">Dnezerlinks-User</span>
    </div>
</div>

<script>
    // 1. Get the logged-in user's email
    const userEmail = localStorage.getItem('userEmail'); 

    async function fetchMyVirtualAccount() {
        if (!userEmail) {
            alert("Please log in first!");
            return;
        }

        try {
            const response = await fetch('https://dnezerlinks-backend.onrender.com/get-virtual-account', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: userEmail })
            });

            const data = await response.json();

            if (data.account_number) {
                // This updates the HTML spans above
                document.getElementById('bankName').innerText = data.bank_name;
                document.getElementById('accNumber').innerText = data.account_number;
                document.getElementById('accName').innerText = data.account_name;
            } else {
                document.getElementById('accNumber').innerText = "Error Loading";
                console.error("Backend error:", data.error);
            }
        } catch (error) {
            console.error("Connection Error:", error);
            document.getElementById('accNumber').innerText = "Server Starting...";
        }
    }

    // Run automatically on page load
    fetchMyVirtualAccount();
</script>

</body>
</html>
