<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fund Wallet - Dnezerlinks</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #007bff; text-align: center; margin-bottom: 10px; }
        .balance-box { background: #007bff; color: white; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 20px; }
        .bank-card { border: 2px dashed #007bff; padding: 15px; border-radius: 10px; background: #eef6ff; }
        .label { font-size: 0.85rem; color: #666; margin-bottom: 2px; display: block; }
        .value { font-size: 1.1rem; font-weight: bold; margin-bottom: 12px; display: block; }
        .acc-num-row { display: flex; align-items: center; justify-content: space-between; }
        #acc-number { font-size: 1.4rem; color: #222; font-weight: bold; }
        .copy-btn { background: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }

        #status-msg {
            text-align: center;
            font-weight: bold;
            padding: 20px;
            font-size: 1.1rem;
            min-height: 100px;
            transition: all 0.4s ease;
        }
        .error { color: #e74c3c !important; }
        .success { color: #27ae60 !important; }
        #account-ui { display: none; }
    </style>
</head>
<body>

<div class="container">
    <button onclick="location.href='home.html'" style="border:none; background:none; color:#007bff; cursor:pointer; margin-bottom:10px;">⬅ Back Home</button>
    <h2>Fund Wallet</h2>
    
    <div class="balance-box">
        <span style="font-size: 0.9rem;">Wallet Balance</span><br>
        <span id="wallet-balance" style="font-size: 1.8rem; font-weight: bold;">₦0.00</span>
    </div>

    <div id="status-msg">Checking account status...</div>

    <div id="account-ui">
        <div class="bank-card">
            <span class="label">BANK NAME</span>
            <span class="value" id="bank-name">---</span>
            <span class="label">ACCOUNT NUMBER</span>
            <div class="acc-num-row">
                <span id="acc-number">----------</span>
                <button class="copy-btn" onclick="copyAccount()">Copy</button>
            </div>
            <span class="label" style="margin-top:15px;">ACCOUNT NAME</span>
            <span class="value" id="acc-name">---</span>
        </div>
        <p style="font-size:0.8rem; color:red; text-align:center; margin-top:10px;">
            Note: A 2% fee applies to all automated deposits.
        </p>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAXWh3ls4yEANmGy4g7xZ8jlBN0KoFC5yc",
        authDomain: "dnezerlinks.firebaseapp.com",
        databaseURL: "https://dnezerlinks-default-rtdb.firebaseio.com",
        projectId: "dnezerlinks",
        appId: "1:1028450580168:web:d7a48462a128f02aa657fd"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let animationInterval = null;

    function startLoadingAnimations() {
        const statusMsg = document.getElementById("status-msg");
        const messages = [
            "Checking your account status...",
            "Sending request to Billstack...",
            "Generating dedicated account number...",
            "Processing your details, please wait..."
        ];
        let i = 0;

        if (animationInterval) clearInterval(animationInterval);
        
        animationInterval = setInterval(() => {
            statusMsg.innerText = messages[i];
            i = (i + 1) % messages.length;
        }, 3500);
    }

    function stopAnimationAndShow(message, isError = false) {
        if (animationInterval) {
            clearInterval(animationInterval);
            animationInterval = null;
        }
        const status = document.getElementById("status-msg");
        status.innerText = message;
        status.className = isError ? "error" : "success";
    }

    firebase.auth().onAuthStateChanged(async (user) => {
        if (!user) return window.location.href = 'login.html';

        const userRef = db.ref(`users/${user.uid}`);

        userRef.on('value', async (snap) => {
            const data = snap.val() || {};

            // === ACCOUNT ALREADY EXISTS ===
            if (data.account_number) {
                document.getElementById("wallet-balance").innerText = 
                    "₦" + parseFloat(data.balance || 0).toLocaleString(undefined, {minimumFractionDigits: 2});

                document.getElementById("bank-name").innerText = data.bank_name || "N/A";
                document.getElementById("acc-number").innerText = data.account_number;
                document.getElementById("acc-name").innerText = data.account_name || "Customer";

                document.getElementById("status-msg").style.display = "none";
                document.getElementById("account-ui").style.display = "block";
                return;
            }

            // === NO ACCOUNT → CREATE ONE ===
            if (!animationInterval) startLoadingAnimations();

            const rawName = data.name || "";
            const nameParts = rawName.trim().split(/\s+/);
            const fName = nameParts[0] || "User";
            const lName = nameParts[1] || user.uid.substring(0, 4);

            try {
                const response = await fetch('https://dnezerlinks-backend.onrender.com/api/account/fund', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        uid: user.uid,
                        email: user.email,
                        first_name: fName,
                        last_name: lName,
                        phone: data.phone || "08000000000"
                    })
                });

                const result = await response.json();

                // Stop animation and show backend message
                if (result.success) {
                    stopAnimationAndShow(result.message || "Account created successfully!");
                } else {
                    stopAnimationAndShow(
                        result.error || result.details || "Failed to create account. Please refresh.", 
                        true
                    );
                }
            } catch (err) {
                console.error(err);
                stopAnimationAndShow("Network error. Please check your connection and refresh the page.", true);
            }
        });
    });

    function copyAccount() {
        const num = document.getElementById("acc-number").innerText;
        if (num && num.length > 5) {
            navigator.clipboard.writeText(num).then(() => alert("Account number copied to clipboard!"));
        }
    }
</script>
</body>
</html>
