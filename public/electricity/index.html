<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricity Bill - Dnezerlinks</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #0d47a1; --accent: #ffab00; }
        body { font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; background: #f4f4f4; display: flex; justify-content: center; }
        .card { background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
        h2 { color: var(--primary); margin-bottom: 20px; text-align: center; }
        label { font-size: 14px; font-weight: 600; color: #555; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0 20px 0; border-radius: 6px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: var(--primary); color: white; font-weight: bold; border: none; cursor: pointer; margin-top: 10px; transition: background 0.3s; }
        button:active { background: #1565c0; transform: scale(0.98); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .back-link { display: block; text-align: center; color: #666; text-decoration: none; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>💡 Electricity Bill</h2>

        <label>Select Disco</label>
        <select id="disco">
            <option value="">-- Choose Disco --</option>
            <option value="AEDC">AEDC (Abuja)</option>
            <option value="BEDC">BEDC (Benin)</option>
            <option value="EEDC">EEDC (Enugu)</option>
            <option value="EKEDC">EKEDC (Eko)</option>
            <option value="IBEDC">IBEDC (Ibadan)</option>
            <option value="IKEDC">IKEDC (Ikeja)</option>
            <option value="JEDC">JEDC (Jos)</option>
            <option value="KAEDCO">KAEDCO (Kaduna)</option>
            <option value="KEDCO">KEDCO (Kano)</option>
            <option value="PHEDC">PHEDC (Port Harcourt)</option>
            <option value="YEDC">YEDC (Yola)</option>
        </select>

        <label>Meter Type</label>
        <select id="meterType">
            <option value="Prepaid">Prepaid</option>
            <option value="Postpaid">Postpaid</option>
        </select>

        <label>Meter Number</label>
        <input type="number" id="meterNum" placeholder="Enter Meter Number">

        <label>Amount (₦)</label>
        <input type="number" id="amount" placeholder="Min ₦1,000" min="1000">

        <button id="payBtn" onclick="processElectricity()">Pay Bill Now</button>
        <a href="../home.html" class="back-link">← Back to Dashboard</a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAXWh3ls4yEANmGy4g7xZ8jlBN0KoFC5yc",
            authDomain: "dnezerlinks.firebaseapp.com",
            databaseURL: "https://dnezerlinks-default-rtdb.firebaseio.com",
            projectId: "dnezerlinks",
            appId: "1:1028450580168:web:d7a48462a128f02aa657fd"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const auth = firebase.auth();

        async function processElectricity() {
            const disco = document.getElementById('disco').value;
            const meterType = document.getElementById('meterType').value;
            const meterNum = document.getElementById('meterNum').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const payBtn = document.getElementById('payBtn');
            const user = auth.currentUser;

            if (!user) { alert("Please login first."); return; }
            if (!disco || !meterNum || isNaN(amount) || amount < 1000) {
                alert("❌ Please fill all fields correctly (Minimum ₦1,000).");
                return;
            }

            const confirmMsg = `CONFIRM PAYMENT\n\n🏢 Disco: ${disco}\n⚡ Type: ${meterType}\n🔢 Meter: ${meterNum}\n💰 Amount: ₦${amount.toLocaleString()}\n\nProceed?`;
            if (!confirm(confirmMsg)) return;

            payBtn.disabled = true;
            payBtn.innerText = "Processing...";

            const userRef = database.ref('users/' + user.uid);

            userRef.child('balance').transaction(currentBal => {
                if (currentBal === null || currentBal < amount) return; 
                return currentBal - amount;
            }, (error, committed) => {
                if (!committed) {
                    alert("❌ Insufficient Wallet Balance!");
                    payBtn.disabled = false;
                    payBtn.innerText = "Pay Bill Now";
                } else {
                    database.ref('transactions/' + user.uid).push({
                        type: 'Electricity',
                        disco: disco,
                        meterNum: meterNum,
                        meterType: meterType,
                        amount: amount,
                        status: 'Successful',
                        date: new Date().toLocaleString()
                    }).then(() => {
                        alert("✅ Payment Successful!");
                        window.location.href = "../home.html";
                    });
                }
            });
        }
    </script>
</body>
</html>
