<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Failed - Dnezerlinks</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f4f4; margin: 0; display: flex; flex-direction: column; align-items: center; }

        .container { padding: 20px; max-width: 450px; width: 90%; margin-top: 40px; }

        .icon { font-size: 60px; color: #c62828; margin-bottom: 15px; }
        h2 { color: #333; margin: 0 0 10px; }
        p { color: #666; line-height: 1.5; margin-bottom: 25px; }
        .btn { display: inline-block; width: 100%; padding: 15px; background-color: #0d47a1; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; box-sizing: border-box; }
        .btn-alt { display: inline-block; width: 100%; padding: 12px; color: #0d47a1; text-decoration: none; font-weight: 600; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header"><h2 style="margin:0; font-size: 20px;">Dnezerlinks</h2></div>
    <div class="container">
        <div class="card">
            <div class="icon">✘</div>
            <h2>Funding Failed</h2>
            <p>Something went wrong with your transaction. If you were debited, please contact support.</p>
            <a href="fund.html" class="btn">Try Again</a>

</html>
